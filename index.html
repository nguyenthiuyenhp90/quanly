<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0B3D2E" />
  <meta name="description" content="Hệ thống quản lý sản xuất dây cáp: PO, BOM, Lệnh SX, Giao dịch, Dashboard" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MES App" />
  <title>MES — Quản lý Sản xuất</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#F7F8F6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #root{min-height:100vh}

    /* ── Splash ── */
    #splash{
      position:fixed;inset:0;background:#0B3D2E;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
      z-index:9999;transition:opacity .35s ease
    }
    #splash.hide{opacity:0;pointer-events:none}
    #splash-logo{animation:pulse 1.8s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    #splash h1{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:#fff;font-size:22px;font-weight:700;margin:0;letter-spacing:-.3px
    }
    #splash-sub{color:rgba(255,255,255,.6);font-size:13px;margin:0;font-family:sans-serif}

    /* ── Offline banner ── */
    #offline-bar{
      display:none;position:fixed;top:0;left:0;right:0;
      background:#C8602F;color:#fff;text-align:center;
      font-size:13px;padding:8px;z-index:9000;font-family:sans-serif
    }

    /* ── PWA install ── */
    #pwa-banner{
      position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
      background:#0B3D2E;color:#fff;border-radius:12px;
      padding:12px 18px;font-family:sans-serif;font-size:13px;
      display:none;align-items:center;gap:10px;
      box-shadow:0 4px 24px rgba(0,0,0,.35);z-index:1000;
      max-width:380px;width:calc(100% - 32px)
    }
    #pwa-banner button{
      background:#fff;color:#0B3D2E;border:none;border-radius:8px;
      padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap
    }
    #pwa-close{background:transparent!important;color:rgba(255,255,255,.55)!important;padding:4px 8px!important;font-size:20px!important}

    /* ── Error screen ── */
    #error-screen{
      display:none;padding:40px 24px;max-width:560px;margin:0 auto;font-family:sans-serif
    }
    #error-screen h2{color:#B23A3A;margin-bottom:12px}
    #error-screen pre{
      background:#fff5f5;border:1px solid #e8c7c7;border-radius:8px;
      padding:14px;font-size:12px;overflow:auto;white-space:pre-wrap;max-height:220px
    }
    #error-screen button{
      margin-top:16px;padding:11px 22px;background:#0B3D2E;color:#fff;
      border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600
    }
  </style>
</head>

  <h1>MES Sản xuất Cáp</h1>
  <p id="splash-sub">Đang tải...</p>
</div>

<!-- PWA install prompt -->
<div id="pwa-banner">
  <span>📲 Cài app để dùng offline</span>
  <button id="pwa-install">Cài đặt</button>
  <button id="pwa-close">✕</button>

  <pre id="error-detail"></pre>
  <button onclick="location.reload()">🔄 Tải lại trang</button>

      const ngayGD = (g.ngay || "").slice(0, 10);

// ============================================================
// ERROR BOUNDARY
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null,info:null}}
  static getDerivedStateFromError(e){return {err:e}}
  componentDidCatch(e,i){console.error('[MES]',e,i)}
  render(){
    if(this.state.err){
      hideSplash();
      showError(this.state.err.message + '\n\n' + (this.state.err.stack||''));
      return null;
    }
    return this.props.children;
  }
}

// ============================================================
// MOUNT
// ============================================================
function hideSplash(){
  var s = document.getElementById('splash');
  if(s && !s.classList.contains('hide')){
    s.classList.add('hide');
    setTimeout(function(){if(s&&s.parentNode)s.parentNode.removeChild(s)},400);
  }
}
function showError(msg){
  hideSplash();
  var es = document.getElementById('error-screen');
  var ed = document.getElementById('error-detail');
  if(es){es.style.display='block'}
  if(ed){ed.textContent=msg}
  console.error('[MES Error]', msg);
}

try {
  var container = document.getElementById('root');
  var appRoot = ReactDOM.createRoot(container);
  appRoot.render(
    React.createElement(ErrorBoundary, null,
      React.createElement(MESApp)
    )
  );
  // No Babel = instant mount. Hide splash on next animation frame.
  requestAnimationFrame(function(){
    requestAnimationFrame(hideSplash);
  });
} catch(e) {
  showError(e.message + '\n\n' + (e.stack||''));
}

} // end if React defined
</script>

<script>
// ============================================================
// PWA INSTALL PROMPT
// ============================================================
var deferredPrompt = null;
var banner = document.getElementById('pwa-banner');

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  if(banner) banner.style.display = 'flex';
});
document.getElementById('pwa-install').addEventListener('click', async function(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  if(banner) banner.style.display = 'none';
});
document.getElementById('pwa-close').addEventListener('click', function(){
  if(banner) banner.style.display = 'none';
});
window.addEventListener('appinstalled', function(){
  if(banner) banner.style.display = 'none';
});

// ============================================================
// OFFLINE DETECTION
// ============================================================
var offlineBar = document.getElementById('offline-bar');
function updateOnlineStatus(){
  if(offlineBar) offlineBar.style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ============================================================
// SERVICE WORKER
// ============================================================
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js')
      .then(function(r){ console.log('[SW] registered', r.scope); })
      .catch(function(e){ console.warn('[SW] failed', e); });
  });
}
</script>
