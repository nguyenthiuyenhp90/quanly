// ====================================================================
// MODULE LỆNH SẢN XUẤT (LSX)
// ====================================================================
// Cấu trúc 1 LSX:
// {
//   id, ma, congDoanId, bomId, quyCach, ngayTao, trangThai,
//   poItems: [{ poId }],              // các PO được gộp vào lệnh này
//   bienTheData: {                    // ma trận PO x màu = số mét
//     [tenBienThe]: { [poId]: soMet }
//   }
// }

function tinhTongHopLSX(lsx, bom) {
  // Tổng mét theo từng biến thể (cộng tất cả PO)
  const tongMetTheoBienThe = {};
  const tongKgTheoBienThe = {};
  let tongMetCaLenh = 0;
  Object.entries(lsx.bienTheData || {}).forEach(([tenBienThe, poMap]) => {
    let tongMet = 0;
    let tongKg = 0;
    Object.values(poMap).forEach((o) => {
      tongMet += Number(o?.met) || 0;
      tongKg += Number(o?.kg) || 0;
    });
    tongMetTheoBienThe[tenBienThe] = tongMet;
    tongKgTheoBienThe[tenBienThe] = tongKg;
    tongMetCaLenh += tongMet;
  });

  // Tổng NVL dự kiến: nếu đã có mét cho biến thể, tính theo mét x định mức BOM (chính xác nhất
  // vì biết rõ từng loại NVL). Nếu chỉ có kg tổng (Cắt đóng gói theo Pcs, không quy đổi được),
  // không tách được từng loại NVL nên bỏ qua phần này.
  const tongNvl = {};
  if (bom) {
    const bienTheListBOM = bom.dinhMuc?.[lsx.congDoanId] || [];
    bienTheListBOM.forEach((btBOM) => {
      const metCuaBienThe = tongMetTheoBienThe[btBOM.tenBienThe] || 0;
      (btBOM.nvlList || []).forEach((n) => {
        const v = metCuaBienThe * (Number(n.dinhMuc) || 0);
        tongNvl[n.ten] = (tongNvl[n.ten] || 0) + v;
      });
    });
  }

  return { tongMetTheoBienThe, tongKgTheoBienThe, tongMetCaLenh, tongNvl };
}

function ModuleLSX({ poList, bomList, lsxList, persistLSX, gdList }) {
  const [showForm, setShowForm] = useState(false);
  const [editingLSX, setEditingLSX] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [filterCongDoan, setFilterCongDoan] = useState("all");

  const handleSave = async (lsx) => {
    let newList;
    const exists = lsxList.find((l) => l.id === lsx.id);
    if (exists) {
      newList = lsxList.map((l) => (l.id === lsx.id ? lsx : l));
    } else {
      newList = [...lsxList, lsx];
    }
    await persistLSX(newList);
    setShowForm(false);
    setEditingLSX(null);
  };

  const handleDelete = async (id) => {
    await persistLSX(lsxList.filter((l) => l.id !== id));
    setConfirmDelete(null);
  };

  const handleToggleStatus = async (id) => {
    const newList = lsxList.map((l) =>
      l.id === id ? { ...l, trangThai: l.trangThai === "dang_chay" ? "hoan_tat" : "dang_chay" } : l
    );
    await persistLSX(newList);
  };

  const filteredList = useMemo(() => {
    if (filterCongDoan === "all") return lsxList;
    return lsxList.filter((l) => l.congDoanId === filterCongDoan);
  }, [lsxList, filterCongDoan]);

  return (
    <div>
      <div style={styles.moduleHeader}>
        <div>
          <h2 style={styles.moduleTitle}>Lệnh sản xuất</h2>
          <p style={styles.moduleSub}>Gộp nhiều PO cùng quy cách vào 1 lệnh chạy chung</p>
        </div>
        <button
          style={styles.btnPrimary}
          onClick={() => {
            setEditingLSX(null);
            setShowForm(true);
          }}
          disabled={bomList.length === 0 || poList.length === 0}
        >
          <Plus size={18} />
          <span>Tạo Lệnh SX</span>
        </button>
      </div>

      {(bomList.length === 0 || poList.length === 0) && (
        <div style={styles.warnBox}>
          <AlertCircle size={15} />
          <span>Cần có ít nhất 1 BOM và 1 PO trước khi tạo Lệnh sản xuất.</span>
        </div>
      )}

      <div style={styles.filterRow}>
        <button
          onClick={() => setFilterCongDoan("all")}
          style={{ ...styles.filterTab, ...(filterCongDoan === "all" ? styles.filterTabActive : {}) }}
        >
          Tất cả
        </button>
        {CONG_DOAN_LIST.map((cd) => (
          <button
            key={cd.id}
            onClick={() => setFilterCongDoan(cd.id)}
            style={{ ...styles.filterTab, ...(filterCongDoan === cd.id ? styles.filterTabActive : {}) }}
          >
            {cd.ten}
          </button>
        ))}
      </div>

      {filteredList.length === 0 ? (
        <div style={styles.emptyState}>
          <Layers size={40} color="#A9AFA6" />
          <p style={styles.emptyTitle}>Chưa có Lệnh sản xuất nào</p>
          <p style={styles.emptySub}>Gộp các PO cùng quy cách vào 1 lệnh để chạy chung</p>
        </div>
      ) : (
        <div style={styles.lsxList}>
          {filteredList
            .slice()
            .reverse()
            .map((lsx) => {
              const bom = bomList.find((b) => b.id === lsx.bomId);
              return (
                <LSXCard
                  key={lsx.id}
                  lsx={lsx}
                  bom={bom}
                  poList={poList}
                  gdList={gdList}
                  onEdit={() => {
                    setEditingLSX(lsx);
                    setShowForm(true);
                  }}
                  onDelete={() => setConfirmDelete(lsx.id)}
                  onToggleStatus={() => handleToggleStatus(lsx.id)}
                />
              );
            })}
        </div>
      )}

      {showForm && (
        <LSXFormModal
          initial={editingLSX}
          poList={poList}
          bomList={bomList}
          lsxList={lsxList}
          congDoanCoDinh={!editingLSX && filterCongDoan !== "all" ? filterCongDoan : null}
          onClose={() => {
            setShowForm(false);
            setEditingLSX(null);
          }}
          onSave={handleSave}
        />
      )}

      {confirmDelete && (
        <ConfirmModal
          message="Xóa Lệnh sản xuất này? Liên kết với các PO sẽ mất, hành động không thể hoàn tác."
          onCancel={() => setConfirmDelete(null)}
          onConfirm={() => handleDelete(confirmDelete)}
        />
      )}
    </div>
  );
}

function LSXCard({ lsx, bom, poList, gdList, onEdit, onDelete, onToggleStatus }) {
  const [expanded, setExpanded] = useState(false);
  const isDangChay = lsx.trangThai === "dang_chay";
  const { tongMetTheoBienThe, tongKgTheoBienThe, tongMetCaLenh, tongNvl } = useMemo(
    () => tinhTongHopLSX(lsx, bom),
    [lsx, bom]
  );
  const poNames = (lsx.poItems || [])
    .map((item) => poList.find((p) => p.id === item.poId)?.maPO)
    .filter(Boolean);

  // Tồn kho theo từng màu = Đã sản xuất ra (theo ma trận PO×màu của lệnh này)
  // − Đã bị Xuất BTP đi cho công đoạn khác (Giao dịch OUT_BTP có congDoanNguon = công
  // đoạn của lệnh này, gắn đúng LSX này). Đây là số còn lại sẵn sàng cho công đoạn
  // sau lấy tiếp, để tránh xuất quá số đã làm ra.
  const tonKhoTheoBienThe = useMemo(() => {
    const result = {};
    Object.keys(tongMetTheoBienThe || {}).forEach((tenBienThe) => {
      const daSanXuatMet = tongMetTheoBienThe[tenBienThe] || 0;
      const daSanXuatKg = (tongKgTheoBienThe && tongKgTheoBienThe[tenBienThe]) || 0;
      const daXuatDi = (gdList || []).filter(
        (g) =>
          g.loaiGD === "OUT_BTP" &&
          g.gomVao === "lsx" &&
          g.lsxId === lsx.id &&
          g.tenBienThe === tenBienThe
      );
      const daXuatMet = daXuatDi.reduce((acc, g) => acc + (Number(g.soLuongMet) || 0), 0);
      const daXuatKg = daXuatDi.reduce((acc, g) => acc + (Number(g.soLuongKg) || 0), 0);
      result[tenBienThe] = {
        conLaiMet: daSanXuatMet - daXuatMet,
        conLaiKg: daSanXuatKg - daXuatKg,
        daXuatMet,
        daXuatKg,
      };
    });
    return result;
  }, [tongMetTheoBienThe, tongKgTheoBienThe, gdList, lsx.id]);

  // BTP đầu vào đã nhận: với các công đoạn không phải Lõi (cần BTP từ công đoạn
  // trước làm đầu vào, ví dụ Xoắn đôi cần BTP Lõi), gộp theo tên biến thể/BTP
  // từ tất cả Giao dịch Xuất BTP có ĐÍCH = chính xác lệnh này (lsxDichId === lsx.id),
  // không lẫn với các LSX khác cùng công đoạn chạy song song.
  const dauVaoDaNhan = useMemo(() => {
    const result = {};
    (gdList || [])
      .filter((g) => g.loaiGD === "OUT_BTP" && g.lsxDichId === lsx.id)
      .forEach((g) => {
        const ten = g.tenBienThe || "(không rõ)";
        if (!result[ten]) result[ten] = { met: 0, kg: 0 };
        result[ten].met += Number(g.soLuongMet) || 0;
        result[ten].kg += Number(g.soLuongKg) || 0;
      });
    return result;
  }, [gdList, lsx.id]);

  return (
    <div style={styles.bomCard}>
      <button style={styles.bomCardHeader} onClick={() => setExpanded(!expanded)}>
        <div style={styles.bomCardLeft}>
          <div style={styles.bomCodeRow}>
            <span style={styles.bomCode}>{lsx.ma}</span>
            <span style={styles.quyCachTag}>{tenCongDoan(lsx.congDoanId)}</span>
          </div>
          <div style={styles.bomDesc}>
            {bom?.maTP} {bom?.quyCach ? `(${bom.quyCach})` : ""} — {poNames.length} PO gộp
          </div>
          {lsx.ngayTao && <div style={styles.poNgayTao}>Tạo lúc: {formatNgayGio(lsx.ngayTao)}</div>}
        </div>
        <div style={styles.bomCardRight}>
          <span
            style={{
              ...styles.statusBadge,
              background: isDangChay ? "#FBEEE4" : "#E7F0EA",
              color: isDangChay ? "#C8602F" : "#2F6B47",
            }}
          >
            {isDangChay ? "Đang chạy" : "Hoàn tất"}
          </span>
          {expanded ? <ChevronUp size={18} color="#6B7068" /> : <ChevronDown size={18} color="#6B7068" />}
        </div>
      </button>

      {expanded && (
        <div style={styles.bomCardBody}>
          <div style={styles.poTagsRow}>
            {poNames.map((name) => (
              <span key={name} style={styles.poTagChip}>
                {name}
              </span>
            ))}
          </div>

          {Object.keys(dauVaoDaNhan).length > 0 && (
            <div style={styles.dauVaoBox}>
              <div style={styles.dauVaoTitle}>BTP đầu vào đã nhận (từ Giao dịch Xuất BTP của lệnh khác)</div>
              <div style={styles.tongHopGrid}>
                {Object.entries(dauVaoDaNhan).map(([ten, v]) => (
                  <div key={ten} style={styles.dauVaoItem}>
                    <span style={styles.dauVaoName}>{ten}</span>
                    <span style={styles.dauVaoValue}>
                      {v.kg > 0 ? `${formatNumber(v.kg, 1)} kg` : ""}
                      {v.kg > 0 && v.met > 0 ? " · " : ""}
                      {v.met > 0 ? `${formatNumber(v.met, 1)} m` : ""}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={styles.tongHopBox}>
            <div style={styles.tongHopTitle}>Tổng mét theo {tenCongDoan(lsx.congDoanId)} ({CONG_DOAN_LIST.find(c=>c.id===lsx.congDoanId)?.nhanGoiBienThe})</div>
            <div style={styles.tongHopGrid}>
              {Object.entries(tongMetTheoBienThe).map(([ten, met]) => (
                <div key={ten} style={styles.tongHopItem}>
                  <span style={styles.tongHopName}>{ten}</span>
                  <span style={styles.tongHopValue}>{formatNumber(met, 1)} m</span>
                </div>
              ))}
              <div style={{ ...styles.tongHopItem, background: "#0B3D2E" }}>
                <span style={{ ...styles.tongHopName, color: "#CFE3D2" }}>Tổng cả lệnh</span>
                <span style={{ ...styles.tongHopValue, color: "#fff" }}>{formatNumber(tongMetCaLenh, 1)} m</span>
              </div>
            </div>
          </div>

          <div style={styles.tonKhoBox}>
            <div style={styles.tonKhoTitle}>
              Tồn kho còn lại (chưa công đoạn nào lấy đi)
            </div>
            <div style={styles.tongHopGrid}>
              {Object.entries(tonKhoTheoBienThe).map(([ten, tk]) => {
                const heet = tk.conLaiMet <= 0.01 && tk.daXuatMet > 0;
                return (
                  <div
                    key={ten}
                    style={{
                      ...styles.tonKhoItem,
                      ...(heet ? styles.tonKhoItemHeet : {}),
                    }}
                  >
                    <span style={styles.tonKhoName}>{ten}</span>
                    <span style={styles.tonKhoValue}>
                      {tk.conLaiMet > 0 ? `${formatNumber(tk.conLaiMet, 1)} m` : ""}
                      {tk.conLaiMet > 0 && tk.conLaiKg > 0 ? " · " : ""}
                      {tk.conLaiKg > 0 ? `${formatNumber(tk.conLaiKg, 1)} kg` : ""}
                      {tk.conLaiMet <= 0 && tk.conLaiKg <= 0 ? "Hết" : ""}
                    </span>
                    {tk.daXuatMet > 0 && (
                      <span style={styles.tonKhoDaXuat}>Đã xuất: {formatNumber(tk.daXuatMet, 1)} m</span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {Object.keys(tongNvl).length > 0 && (
            <div style={styles.tongHopBox}>
              <div style={styles.tongHopTitle}>NVL dự kiến cần xuất cho cả lệnh</div>
              <div style={styles.tongHopGrid}>
                {Object.entries(tongNvl).map(([ten, kg]) => (
                  <div key={ten} style={styles.tongHopItem}>
                    <span style={styles.tongHopName}>{ten}</span>
                    <span style={styles.tongHopValue}>{formatNumber(kg, 1)} kg</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Chi tiết theo từng PO */}
          <div style={styles.dinhMucCongDoan}>
            <div style={styles.dinhMucCongDoanTitle}>Chi tiết theo từng PO</div>
            <div style={styles.mauTable}>
              {(lsx.poItems || []).map((item) => {
                const po = poList.find((p) => p.id === item.poId);
                if (!po) return null;
                let metPO = 0;
                let kgPO = 0;
                Object.values(lsx.bienTheData || {}).forEach((poMap) => {
                  metPO += Number(poMap[item.poId]?.met) || 0;
                  kgPO += Number(poMap[item.poId]?.kg) || 0;
                });
                const donViThu2Hien = lsx.congDoanId === "cat_dong_goi" && lsx.donViThu2 === "pcs" ? "pcs" : "m";
                return (
                  <div key={item.poId} style={styles.mauRow}>
                    <span style={styles.mauRowLabel}>{po.maPO}</span>
                    <div style={styles.mauRowNvl}>
                      {Object.entries(lsx.bienTheData || {}).map(([ten, poMap]) => {
                        const o = poMap[item.poId];
                        if (!o || ((Number(o.kg) || 0) <= 0 && (Number(o.met) || 0) <= 0)) return null;
                        return (
                          <span key={ten} style={styles.nvlChipDisplay}>
                            {ten}: {o.kg ? `${formatNumber(o.kg, 1)}kg` : ""}
                            {o.kg && o.met ? " / " : ""}
                            {o.met ? `${formatNumber(o.met, 1)}${donViThu2Hien}` : ""}
                          </span>
                        );
                      })}
                      <span style={styles.tongChip}>
                        Tổng PO: {kgPO > 0 ? `${formatNumber(kgPO, 1)}kg` : ""}
                        {kgPO > 0 && metPO > 0 ? " / " : ""}
                        {metPO > 0 ? `${formatNumber(metPO, 1)}${donViThu2Hien}` : ""}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={styles.bomCardFooter}>
            <button onClick={onToggleStatus} style={styles.iconBtn}>
              <CheckCircle2 size={15} />
              <span>{isDangChay ? "Đánh dấu hoàn tất" : "Mở lại"}</span>
            </button>
            <button onClick={onEdit} style={styles.iconBtn}>
              <Edit3 size={15} />
              <span>Sửa</span>
            </button>
            <button onClick={onDelete} style={{ ...styles.iconBtn, color: "#B23A3A" }}>
              <Trash2 size={15} />
              <span>Xóa</span>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function LSXFormModal({ initial, poList, bomList, lsxList, congDoanCoDinh, onClose, onSave }) {
  const [congDoanId, setCongDoanId] = useState(initial?.congDoanId || congDoanCoDinh || "");
  const [bomId, setBomId] = useState(initial?.bomId || "");
  const [selectedPoIds, setSelectedPoIds] = useState((initial?.poItems || []).map((i) => i.poId));
  // bienTheData: { [tenBienThe]: { [poId]: { kg, met } } } - mỗi ô lưu cả 2 đơn vị
  const [bienTheData, setBienTheData] = useState(initial?.bienTheData || {});
  // Đơn vị thứ 2 cho riêng Cắt đóng gói: "m" hoặc "pcs" - tổ trưởng tự chọn khi nhập
  const [donViThu2, setDonViThu2] = useState(initial?.donViThu2 || "m");
  const [error, setError] = useState("");

  const bomChon = bomList.find((b) => b.id === bomId);

  // PO khả dụng để chọn: phải cùng BOM (=cùng quy cách) đã chọn, và PO đó phải có BOM
  // áp dụng công đoạn đang chọn
  const poKhaDung = useMemo(() => {
    if (!bomId) return [];
    return poList.filter((po) => po.bomId === bomId);
  }, [poList, bomId]);

  // Danh sách biến thể (màu) của công đoạn này, theo đúng BOM đã chọn
  const bienTheListBOM = useMemo(() => {
    if (!bomChon || !congDoanId) return [];
    return bomChon.dinhMuc?.[congDoanId] || [];
  }, [bomChon, congDoanId]);

  const isCatDongGoi = congDoanId === "cat_dong_goi";

  const togglePO = (poId) => {
    const dangChon = selectedPoIds.includes(poId);
    if (dangChon) {
      // Bỏ chọn PO: xóa khỏi danh sách và xóa luôn dữ liệu đã điền của PO đó trong ma trận
      setSelectedPoIds((prev) => prev.filter((x) => x !== poId));
      setBienTheData((prev) => {
        const copy = {};
        Object.entries(prev).forEach(([ten, poMap]) => {
          const { [poId]: _bo, ...rest } = poMap;
          copy[ten] = rest;
        });
        return copy;
      });
      return;
    }

    // Thêm PO: tự điền sẵn theo Cascade = Mục tiêu mét TP của PO × Hệ số mét của từng màu,
    // rồi tự tính kg theo định mức BOM của đúng màu đó. Tổ trưởng vẫn sửa tay được sau.
    setSelectedPoIds((prev) => [...prev, poId]);
    const po = poList.find((p) => p.id === poId);
    if (po && bienTheListBOM.length > 0 && !isCatDongGoi) {
      setBienTheData((prev) => {
        const copy = { ...prev };
        bienTheListBOM.forEach((bt) => {
          const heSo = Number(bt.heSoMet) || 1;
          const met = (Number(po.mucTieuMet) || 0) * heSo;
          if (met <= 0) return;
          const dinhMuc = sumNVL(bt.nvlList) || null;
          const kg = dinhMuc ? met * dinhMuc : null;
          copy[bt.tenBienThe] = {
            ...(copy[bt.tenBienThe] || {}),
            [poId]: {
              met: String(Math.round(met * 10) / 10),
              kg: kg !== null ? String(Math.round(kg * 10) / 10) : "",
            },
          };
        });
        return copy;
      });
    }
  };

  // Định mức quy đổi (kg/m) của 1 biến thể = tổng định mức tất cả NVL trong biến thể đó.
  // Dùng để tự tính qua lại giữa kg và mét khi tổ trưởng gõ 1 trong 2 ô.
  // Với Cắt đóng gói đơn vị Pcs thì không quy đổi được (không có nghĩa kg/pcs cố định).
  const layDinhMucBienThe = (tenBienThe) => {
    const bt = bienTheListBOM.find((b) => b.tenBienThe === tenBienThe);
    if (!bt) return null;
    return sumNVL(bt.nvlList) || null;
  };

  const updateOCell = (tenBienThe, poId, field, value) => {
    setBienTheData((prev) => {
      const oCu = prev[tenBienThe]?.[poId] || {};
      const oMoi = { ...oCu, [field]: value };
      // Tự quy đổi qua lại nếu có định mức và không phải Cắt đóng gói/Pcs
      const dinhMuc = layDinhMucBienThe(tenBienThe);
      const coTheQuyDoi = dinhMuc && !(isCatDongGoi && donViThu2 === "pcs");
      if (coTheQuyDoi && value !== "") {
        if (field === "kg") {
          const met = Number(value) / dinhMuc;
          oMoi.met = isFinite(met) ? String(Math.round(met * 10) / 10) : oCu.met || "";
        } else if (field === "met") {
          const kg = Number(value) * dinhMuc;
          oMoi.kg = isFinite(kg) ? String(Math.round(kg * 10) / 10) : oCu.kg || "";
        }
      }
      return { ...prev, [tenBienThe]: { ...(prev[tenBienThe] || {}), [poId]: oMoi } };
    });
  };

  // Tổng hợp preview real-time
  const preview = useMemo(() => {
    const lsxTam = { congDoanId, bienTheData };
    return tinhTongHopLSX(lsxTam, bomChon);
  }, [congDoanId, bienTheData, bomChon]);

  const handleSubmit = () => {
    if (!congDoanId) {
      setError("Vui lòng chọn công đoạn");
      return;
    }
    if (!bomId) {
      setError("Vui lòng chọn mã Thành phẩm (BOM)");
      return;
    }
    if (selectedPoIds.length === 0) {
      setError("Chọn ít nhất 1 PO để gộp vào lệnh");
      return;
    }
    if (bienTheListBOM.length === 0) {
      setError(`BOM này chưa có định mức cho công đoạn "${tenCongDoan(congDoanId)}"`);
      return;
    }

    // clean bienTheData: chỉ giữ PO đã chọn, có ít nhất 1 trong 2 số > 0
    const cleanData = {};
    bienTheListBOM.forEach((bt) => {
      const row = {};
      selectedPoIds.forEach((poId) => {
        const o = bienTheData[bt.tenBienThe]?.[poId] || {};
        const kg = Number(o.kg) || 0;
        const met = Number(o.met) || 0;
        if (kg > 0 || met > 0) row[poId] = { kg: kg > 0 ? kg : null, met: met > 0 ? met : null };
      });
      if (Object.keys(row).length > 0) cleanData[bt.tenBienThe] = row;
    });

    if (Object.keys(cleanData).length === 0) {
      setError("Vui lòng nhập số liệu cho ít nhất 1 ô");
      return;
    }

    const lsx = {
      id: initial?.id || uid(),
      ma: initial?.ma || taoMaLSXTangDan(congDoanId, lsxList),
      congDoanId,
      bomId,
      ngayTao: initial?.ngayTao || nowISO(),
      trangThai: initial?.trangThai || "dang_chay",
      poItems: selectedPoIds.map((poId) => ({ poId })),
      bienTheData: cleanData,
      donViThu2: isCatDongGoi ? donViThu2 : "m",
    };
    onSave(lsx);
  };

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalBox} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <h2 style={styles.modalTitle}>{initial ? "Sửa Lệnh sản xuất" : "Tạo Lệnh sản xuất"}</h2>
          <button onClick={onClose} style={styles.modalCloseBtn}>
            <X size={20} />
          </button>
        </div>

        <div style={styles.modalBody}>
          {error && (
            <div style={styles.errorBox}>
              <AlertCircle size={16} />
              <span>{error}</span>
            </div>
          )}

          {congDoanCoDinh ? (
            <>
              <div style={styles.sectionDivider}>1. Công đoạn (đã chọn từ tab lọc)</div>
              <input
                style={{ ...styles.input, background: "#EDEFEA", color: "#1A1D1B", fontWeight: 600 }}
                value={tenCongDoan(congDoanCoDinh)}
                disabled
                readOnly
              />
            </>
          ) : (
            <>
              <div style={styles.sectionDivider}>1. Chọn công đoạn *</div>
              <div style={styles.chipGrid}>
                {CONG_DOAN_LIST.map((cd) => (
                  <button
                    key={cd.id}
                    type="button"
                    onClick={() => setCongDoanId(cd.id)}
                    style={{ ...styles.chip, ...(congDoanId === cd.id ? styles.chipActive : {}) }}
                  >
                    {cd.ten}
                  </button>
                ))}
              </div>
            </>
          )}

          <div style={styles.sectionDivider}>2. Chọn mã Thành phẩm / Quy cách *</div>
          <select style={styles.input} value={bomId} onChange={(e) => { setBomId(e.target.value); setSelectedPoIds([]); setBienTheData({}); }}>
            <option value="">-- Chọn mã TP --</option>
            {bomList.map((b) => (
              <option key={b.id} value={b.id}>
                {b.maTP} {b.quyCach ? `(${b.quyCach})` : ""}
              </option>
            ))}
          </select>

          {bomId && congDoanId && (
            <>
              <div style={styles.sectionDivider}>3. Chọn các PO cùng quy cách để gộp *</div>
              {poKhaDung.length === 0 ? (
                <div style={styles.warnBox}>
                  <AlertCircle size={15} />
                  <span>Không có PO nào đang dùng mã TP này. Vào tab "PO" để tạo PO trước.</span>
                </div>
              ) : (
                <div style={styles.poSelectGrid}>
                  {poKhaDung.map((po) => (
                    <button
                      key={po.id}
                      type="button"
                      onClick={() => togglePO(po.id)}
                      style={{
                        ...styles.poSelectChip,
                        ...(selectedPoIds.includes(po.id) ? styles.poSelectChipActive : {}),
                      }}
                    >
                      <span>{po.maPO}</span>
                      <span style={styles.poSelectSub}>{po.khachHang} · {formatNumber(po.mucTieuMet)}m</span>
                    </button>
                  ))}
                </div>
              )}

              {selectedPoIds.length > 0 && bienTheListBOM.length > 0 && (
                <>
                  <div style={styles.sectionDivider}>
                    4. Nhập kg và {isCatDongGoi ? "đơn vị thứ 2" : "mét"} cho từng{" "}
                    {CONG_DOAN_LIST.find((c) => c.id === congDoanId)?.nhanGoiBienThe} × PO
                  </div>

                  {isCatDongGoi && (
                    <Field label="Đơn vị cho cột thứ 2 (ngoài kg)">
                      <select style={styles.input} value={donViThu2} onChange={(e) => setDonViThu2(e.target.value)}>
                        <option value="m">Mét</option>
                        <option value="pcs">Pcs (cuộn/cuốn/cái)</option>
                      </select>
                    </Field>
                  )}

                  <div style={styles.matrixWrap}>
                    <table style={styles.matrixTable}>
                      <thead>
                        <tr>
                          <th style={styles.matrixTh}>{CONG_DOAN_LIST.find((c) => c.id === congDoanId)?.nhanGoiBienThe}</th>
                          {selectedPoIds.map((poId) => {
                            const po = poList.find((p) => p.id === poId);
                            return (
                              <th key={poId} style={styles.matrixTh} colSpan={2}>
                                {po?.maPO}
                              </th>
                            );
                          })}
                        </tr>
                        <tr>
                          <th style={styles.matrixTh}></th>
                          {selectedPoIds.map((poId) => (
                            <React.Fragment key={poId}>
                              <th style={styles.matrixThSub}>kg</th>
                              <th style={styles.matrixThSub}>{isCatDongGoi ? (donViThu2 === "pcs" ? "pcs" : "m") : "m"}</th>
                            </React.Fragment>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {bienTheListBOM.map((bt) => (
                          <tr key={bt.tenBienThe}>
                            <td style={styles.matrixTdLabel}>{bt.tenBienThe}</td>
                            {selectedPoIds.map((poId) => {
                              const o = bienTheData[bt.tenBienThe]?.[poId] || {};
                              return (
                                <React.Fragment key={poId}>
                                  <td style={styles.matrixTd}>
                                    <input
                                      type="number"
                                      style={styles.matrixInput}
                                      placeholder="0"
                                      value={o.kg ?? ""}
                                      onChange={(e) => updateOCell(bt.tenBienThe, poId, "kg", e.target.value)}
                                    />
                                  </td>
                                  <td style={styles.matrixTd}>
                                    <input
                                      type="number"
                                      style={styles.matrixInput}
                                      placeholder="0"
                                      value={o.met ?? ""}
                                      onChange={(e) => updateOCell(bt.tenBienThe, poId, "met", e.target.value)}
                                    />
                                  </td>
                                </React.Fragment>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={styles.matrixHint}>
                    Gõ 1 ô (kg hoặc {isCatDongGoi && donViThu2 === "pcs" ? "pcs" : "mét"}) sẽ tự tính ô còn lại theo định mức BOM
                    {isCatDongGoi && donViThu2 === "pcs" ? " (trừ khi đơn vị là Pcs - không quy đổi được, cần nhập tay cả 2)" : ""}.
                    {!isCatDongGoi && " Số đã tự điền theo mục tiêu mét của PO × hệ số mét mỗi màu — sửa lại tay nếu thực tế khác."}
                  </div>
                </>
              )}
            </>
          )}

          {preview.tongMetCaLenh > 0 && (
            <div style={styles.tongHopBoxSticky}>
              <div style={styles.tongHopTitle}>Tổng hợp lệnh (đang nhập)</div>
              <div style={styles.tongHopGrid}>
                <div style={{ ...styles.tongHopItem, background: "#0B3D2E" }}>
                  <span style={{ ...styles.tongHopName, color: "#CFE3D2" }}>
                    Tổng {isCatDongGoi && donViThu2 === "pcs" ? "Pcs" : "mét"} cả lệnh
                  </span>
                  <span style={{ ...styles.tongHopValue, color: "#fff" }}>{formatNumber(preview.tongMetCaLenh, 1)} {isCatDongGoi && donViThu2 === "pcs" ? "pcs" : "m"}</span>
                </div>
                {Object.entries(preview.tongKgTheoBienThe || {}).map(([ten, kg]) =>
                  kg > 0 ? (
                    <div key={`kg-${ten}`} style={styles.tongHopItem}>
                      <span style={styles.tongHopName}>{ten} (đã nhập)</span>
                      <span style={styles.tongHopValue}>{formatNumber(kg, 1)} kg</span>
                    </div>
                  ) : null
                )}
                {Object.entries(preview.tongNvl).map(([ten, kg]) => (
                  <div key={ten} style={styles.tongHopItem}>
                    <span style={styles.tongHopName}>{ten}</span>
                    <span style={styles.tongHopValue}>{formatNumber(kg, 1)} kg</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div style={styles.modalFooter}>
          <button style={styles.btnGhost} onClick={onClose}>
            Hủy
          </button>
          <button style={styles.btnPrimary} onClick={handleSubmit}>
            {initial ? "Lưu thay đổi" : "Tạo Lệnh SX"}
            <ChevronRight size={16} />
          </button>
        </div>
      </div>
    </div>
  );
}

// ====================================================================
// MODULE GIAO DỊCH (sổ trung tâm)
// ====================================================================
// Cấu trúc 1 giao dịch:
// {
//   id, ngay, loaiGD: ISSUE_NVL | IN_BTP | OUT_BTP | IN_TP | SCRAP,
//   gomVao: "lsx" | "po"      -> gắn với LSX hay PO trực tiếp
//   lsxId, poId,              -> id tương ứng (chỉ 1 trong 2 có giá trị theo gomVao)
//   congDoanId,
//   tenBienThe,               -> màu/tên BTP liên quan (nếu có)
//   tenNVL,                   -> tên NVL/BTP cụ thể
//   soLuong, donVi: "kg" | "m",
//   lyDoPhe,                  -> chỉ dùng khi loaiGD = SCRAP
//   ghiChu,
// }

const LOAI_GD_LIST = [
  { id: "ISSUE_NVL", ten: "Xuất NVL", mau: "#C8602F", bg: "#FBEEE4" },
  { id: "IN_BTP", ten: "Nhập BTP", mau: "#2F6B47", bg: "#E7F0EA" },
  { id: "OUT_BTP", ten: "Xuất BTP", mau: "#A8632F", bg: "#FBEEE4" },
  { id: "IN_TP", ten: "Nhập TP", mau: "#0B3D2E", bg: "#E7F0EA" },
  { id: "SCRAP", ten: "Phế", mau: "#B23A3A", bg: "#F8E9E9" },
];

// Gợi ý lý do phế: KHÔNG dùng danh sách cố định, chỉ lấy từ các lý do đã từng
// ghi nhận trước đó trong Giao dịch (giống cách BOM gợi ý tên NVL theo lịch sử)
function layGoiYLyDoPhe(gdList) {
  const set = new Set();
  (gdList || []).forEach((g) => {
    if (g.loaiGD === "SCRAP" && g.lyDoPhe) set.add(g.lyDoPhe);
  });
  return Array.from(set).sort((a, b) => a.localeCompare(b, "vi"));
}

function tenLoaiGD(id) {
  return LOAI_GD_LIST.find((l) => l.id === id)?.ten || id;
}

function ModuleGiaoDich({ gdList, persistGD, poList, bomList, lsxList }) {
  const [showForm, setShowForm] = useState(false);
  const [editingGD, setEditingGD] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [filterLoai, setFilterLoai] = useState("all");
  // Lọc thêm theo LSX hoặc PO cụ thể, để xem riêng giao dịch của 1 lệnh/đơn
  const [filterGomVao, setFilterGomVao] = useState(""); // "" | "lsx:<id>" | "po:<id>"
  // Lọc theo tên NVL/BTP cụ thể, để xem tổng đã xử lý cho đúng loại đó
  const [filterTen, setFilterTen] = useState("");

  const handleSaveGD = async (gd) => {
    const exists = gdList.find((g) => g.id === gd.id);
    if (exists) {
      await persistGD(gdList.map((g) => (g.id === gd.id ? gd : g)));
    } else {
      await persistGD([...gdList, gd]);
    }
    setShowForm(false);
    setEditingGD(null);
  };

  const handleDelete = async (id) => {
    await persistGD(gdList.filter((g) => g.id !== id));
    setConfirmDelete(null);
  };

  // Danh sách tên NVL/BTP duy nhất đã từng xuất hiện trong Giao dịch, để chọn lọc
  const tenNvlBtpGoiY = useMemo(() => {
    const set = new Set();
    gdList.forEach((g) => {
      if (g.tenNVL) set.add(g.tenNVL);
    });
    return Array.from(set).sort((a, b) => a.localeCompare(b, "vi"));
  }, [gdList]);

  const filteredList = useMemo(() => {
    let list = filterLoai === "all" ? gdList : gdList.filter((g) => g.loaiGD === filterLoai);
    if (filterGomVao) {
      const [loai, id] = filterGomVao.split(":");
      list = list.filter((g) =>
        loai === "lsx" ? g.gomVao === "lsx" && g.lsxId === id : g.gomVao === "po" && g.poId === id
      );
    }
    if (filterTen) {
      list = list.filter((g) => g.tenNVL === filterTen);
    }
    return list.slice().sort((a, b) => (b.ngay || "").localeCompare(a.ngay || "") || b.id.localeCompare(a.id));
  }, [gdList, filterLoai, filterGomVao, filterTen]);

  // Tổng cộng theo từng LOẠI giao dịch, riêng cho tên NVL/BTP đang lọc (filterTen).
  // Không cộng lẫn các loại vào nhau - ví dụ "Đồng 0.195" đã Xuất NVL bao nhiêu kg
  // tách biệt với đã Nhập BTP bao nhiêu, dù cùng tên.
  const tongTheoTenFilter = useMemo(() => {
    if (!filterTen) return null;
    const map = {};
    LOAI_GD_LIST.forEach((l) => (map[l.id] = { kg: 0, m: 0, count: 0 }));
    gdList
      .filter((g) => g.tenNVL === filterTen)
      .forEach((g) => {
        if (!map[g.loaiGD]) return;
        map[g.loaiGD].count += 1;
        map[g.loaiGD].kg += Number(g.soLuongKg) || 0;
        map[g.loaiGD].m += Number(g.soLuongMet) || 0;
      });
    return map;
  }, [gdList, filterTen]);

  return (
    <div>
      <div style={styles.moduleHeader}>
        <div>
          <h2 style={styles.moduleTitle}>Giao dịch</h2>
          <p style={styles.moduleSub}>Sổ nhập liệu thực tế hàng ngày — xuất NVL, nhập/xuất BTP, nhập TP, phế</p>
        </div>
        <button
          style={styles.btnPrimary}
          onClick={() => {
            setEditingGD(null);
            setShowForm(true);
          }}
        >
          <Plus size={18} />
          <span>Ghi giao dịch</span>
        </button>
      </div>

      <div style={styles.filterRow}>
        <button
          onClick={() => setFilterLoai("all")}
          style={{ ...styles.filterTab, ...(filterLoai === "all" ? styles.filterTabActive : {}) }}
        >
          Tất cả
        </button>
        {LOAI_GD_LIST.map((l) => (
          <button
            key={l.id}
            onClick={() => setFilterLoai(l.id)}
            style={{ ...styles.filterTab, ...(filterLoai === l.id ? styles.filterTabActive : {}) }}
          >
            {l.ten}
          </button>
        ))}
      </div>

      <div style={styles.gdFilterGomVaoRow}>
        <Field label="Lọc theo Lệnh SX hoặc PO (xem riêng giao dịch của 1 lệnh/đơn)">
          <select style={styles.input} value={filterGomVao} onChange={(e) => setFilterGomVao(e.target.value)}>
            <option value="">-- Tất cả LSX/PO --</option>
            {lsxList.length > 0 && (
              <optgroup label="Lệnh sản xuất">
                {lsxList.map((l) => (
                  <option key={l.id} value={`lsx:${l.id}`}>
                    {l.ma} ({tenCongDoan(l.congDoanId)})
                  </option>
                ))}
              </optgroup>
            )}
            {poList.length > 0 && (
              <optgroup label="PO">
                {poList.map((p) => (
                  <option key={p.id} value={`po:${p.id}`}>
                    {p.maPO} — {p.khachHang}
                  </option>
                ))}
              </optgroup>
            )}
          </select>
        </Field>
        <Field label="Lọc theo tên NVL/BTP (xem tổng đã xử lý cho 1 loại)">
          <select style={styles.input} value={filterTen} onChange={(e) => setFilterTen(e.target.value)}>
            <option value="">-- Tất cả NVL/BTP --</option>
            {tenNvlBtpGoiY.map((ten) => (
              <option key={ten} value={ten}>
                {ten}
              </option>
            ))}
          </select>
        </Field>
      </div>

      {tongTheoTenFilter && (
        <div style={styles.gdTongTheoTenBox}>
          <div style={styles.gdTongTheoTenTitle}>Tổng cộng "{filterTen}" theo từng loại giao dịch</div>
          <div style={styles.gdSummaryGrid}>
            {LOAI_GD_LIST.map((l) => {
              const t = tongTheoTenFilter[l.id];
              if (t.count === 0) return null;
              return (
                <div key={l.id} style={{ ...styles.gdSummaryCard, borderColor: l.bg }}>
                  <span style={{ ...styles.gdSummaryLabel, color: l.mau }}>{l.ten}</span>
                  <span style={styles.gdSummaryValue}>
                    {t.kg > 0 && `${formatNumber(t.kg, 1)} kg`}
                    {t.kg > 0 && t.m > 0 && " · "}
                    {t.m > 0 && `${formatNumber(t.m, 1)} m`}
                  </span>
                  <span style={styles.gdSummaryCount}>{t.count} giao dịch</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {filteredList.length === 0 ? (
        <div style={styles.emptyState}>
          <ClipboardList size={40} color="#A9AFA6" />
          <p style={styles.emptyTitle}>Chưa có giao dịch nào</p>
          <p style={styles.emptySub}>Ghi nhận giao dịch đầu tiên để bắt đầu theo dõi thực tế sản xuất</p>
        </div>
      ) : (
        <div style={styles.gdList}>
          {filteredList.map((gd) => (
            <GDRow
              key={gd.id}
              gd={gd}
              poList={poList}
              lsxList={lsxList}
              onEdit={() => {
                setEditingGD(gd);
                setShowForm(true);
              }}
              onDelete={() => setConfirmDelete(gd.id)}
            />
          ))}
        </div>
      )}

      {showForm && (
        <GDFormModal
          initial={editingGD}
          poList={poList}
          bomList={bomList}
          lsxList={lsxList}
          gdList={gdList}
          loaiCoDinh={!editingGD && filterLoai !== "all" ? filterLoai : null}
          onClose={() => {
            setShowForm(false);
            setEditingGD(null);
          }}
          onSave={handleSaveGD}
        />
      )}

      {confirmDelete && (
        <ConfirmModal
          message="Xóa giao dịch này? Số liệu tồn kho và báo cáo sẽ được tính lại ngay."
          onCancel={() => setConfirmDelete(null)}
          onConfirm={() => handleDelete(confirmDelete)}
        />
      )}
    </div>
  );
}

function GDRow({ gd, poList, lsxList, onEdit, onDelete }) {
  const loai = LOAI_GD_LIST.find((l) => l.id === gd.loaiGD);
  const po = gd.gomVao === "po" ? poList.find((p) => p.id === gd.poId) : null;
  const lsx = gd.gomVao === "lsx" ? lsxList.find((l) => l.id === gd.lsxId) : null;

  return (
    <div style={styles.gdRow}>
      <div style={styles.gdRowLeft}>
        <span style={{ ...styles.gdLoaiBadge, background: loai?.bg, color: loai?.mau }}>{loai?.ten}</span>
        <div>
          <div style={styles.gdRowMain}>
            {gd.tenNVL || gd.tenBienThe || tenCongDoan(gd.congDoanId)}
            {gd.tenBienThe && gd.tenNVL && <span style={styles.gdRowSub}> · {gd.tenBienThe}</span>}
          </div>
          <div style={styles.gdRowMeta}>
            {gd.ngay} · {tenCongDoan(gd.congDoanId)} ·{" "}
            {lsx ? `LSX ${lsx.ma}` : po ? `PO ${po.maPO}` : ""}
            {gd.loaiGD === "SCRAP" && gd.lyDoPhe ? ` · Lý do: ${gd.lyDoPhe}` : ""}
          </div>
        </div>
      </div>
      <div style={styles.gdRowRight}>
        <span style={styles.gdSoLuong}>
          {gd.soLuongKg ? `${formatNumber(gd.soLuongKg, 1)} kg` : ""}
          {gd.soLuongKg && gd.soLuongMet ? " · " : ""}
          {gd.soLuongMet ? `${formatNumber(gd.soLuongMet, 1)} ${gd.donViSoLuongMet === "pcs" ? "pcs" : "m"}` : ""}
        </span>
        <button onClick={onEdit} style={styles.iconBtn}>
          <Edit3 size={15} />
        </button>
        <button onClick={onDelete} style={{ ...styles.iconBtn, color: "#B23A3A" }}>
          <Trash2 size={15} />
        </button>
      </div>
    </div>
  );
}

function GDFormModal({ initial, poList, bomList, lsxList, gdList, loaiCoDinh, onClose, onSave }) {
  const [ngay, setNgay] = useState(initial?.ngay || todayISO());
  const [loaiGD, setLoaiGD] = useState(initial?.loaiGD || loaiCoDinh || "ISSUE_NVL");
  const [gomVao, setGomVao] = useState(initial?.gomVao || "lsx"); // "lsx" | "po"
  const [lsxId, setLsxId] = useState(initial?.lsxId || "");
  const [lsxDichId, setLsxDichId] = useState(initial?.lsxDichId || ""); // riêng cho Xuất BTP: LSX đích cụ thể (không chỉ công đoạn)
  const [poId, setPoId] = useState(initial?.poId || "");
  const [congDoanId, setCongDoanId] = useState(initial?.congDoanId || "");
  const [tenBienThe, setTenBienThe] = useState(initial?.tenBienThe || "");
  const [tenNVL, setTenNVL] = useState(initial?.tenNVL || "");
  const [soLuongKg, setSoLuongKg] = useState(initial?.soLuongKg != null ? String(initial.soLuongKg) : "");
  const [soLuongMet, setSoLuongMet] = useState(initial?.soLuongMet != null ? String(initial.soLuongMet) : "");
  const [donViCatDongGoi, setDonViCatDongGoi] = useState(initial?.donViSoLuongMet || "m");
  const [lastEdited, setLastEdited] = useState(null); // "kg" | "met" - ô vừa gõ tay gần nhất
  const [lyDoPhe, setLyDoPhe] = useState(initial?.lyDoPhe || "");
  const [ghiChu, setGhiChu] = useState(initial?.ghiChu || "");
  const [error, setError] = useState("");

  const lsxChon = lsxList.find((l) => l.id === lsxId);
  const poChon = poList.find((p) => p.id === poId);
  const bomLienQuan = gomVao === "lsx" ? bomList.find((b) => b.id === lsxChon?.bomId) : bomList.find((b) => b.id === poChon?.bomId);

  // Với Xuất BTP từ LSX: congDoanId là ĐÍCH (nơi dùng), còn biến thể/màu và định mức
  // phải tra theo công đoạn NGUỒN (đúng công đoạn của LSX đang xuất ra), không phải đích.
  // Các loại giao dịch khác: nguồn = đích = congDoanId như cũ.
  const congDoanTraCuuBienThe =
    loaiGD === "OUT_BTP" && gomVao === "lsx" ? lsxChon?.congDoanId || "" : congDoanId;

  // Gợi ý biến thể (màu/tên BTP) theo đúng công đoạn nguồn + BOM liên quan
  const bienTheGoiY = useMemo(() => {
    if (!bomLienQuan || !congDoanTraCuuBienThe) return [];
    const list = bomLienQuan.dinhMuc?.[congDoanTraCuuBienThe] || [];
    return list.map((bt) => bt.tenBienThe);
  }, [bomLienQuan, congDoanTraCuuBienThe]);

  // Gợi ý tên NVL theo đúng công đoạn nguồn + biến thể đã chọn trong BOM
  const nvlGoiY = useMemo(() => {
    if (!bomLienQuan || !congDoanTraCuuBienThe) return [];
    const list = bomLienQuan.dinhMuc?.[congDoanTraCuuBienThe] || [];
    const bt = list.find((b) => b.tenBienThe === tenBienThe);
    if (bt) return bt.nvlList.map((n) => n.ten);
    // Nếu chưa chọn đúng biến thể, gợi ý hết NVL của công đoạn đó
    const set = new Set();
    list.forEach((b) => b.nvlList.forEach((n) => set.add(n.ten)));
    return Array.from(set);
  }, [bomLienQuan, congDoanTraCuuBienThe, tenBienThe]);

  // Định mức (kg/m) dùng để quy đổi qua lại giữa kg và mét cho Nhập/Xuất BTP.
  // Dùng TỔNG định mức tất cả NVL trong đúng biến thể/màu đang chọn, tra theo
  // công đoạn NGUỒN (giống cách Lệnh SX đã làm) - không cần chọn riêng từng NVL.
  const dinhMucQuyDoi = useMemo(() => {
    if (!bomLienQuan || !congDoanTraCuuBienThe || !tenBienThe) return null;
    const list = bomLienQuan.dinhMuc?.[congDoanTraCuuBienThe] || [];
    const bt = list.find((b) => b.tenBienThe === tenBienThe);
    if (!bt) return null;
    return sumNVL(bt.nvlList) || null;
  }, [bomLienQuan, congDoanTraCuuBienThe, tenBienThe]);

  const congDoanKhaDung = gomVao === "lsx" ? (lsxChon ? [lsxChon.congDoanId] : []) : CONG_DOAN_LIST.map((c) => c.id);
  const loaiHienTai = LOAI_GD_LIST.find((l) => l.id === loaiGD);
  // Tên màu/BTP chỉ có ý nghĩa với BTP (Nhập/Xuất BTP), Xuất NVL thô và Nhập TP/Phế
  // không cần biến thể này — ẩn ô khi không liên quan, tránh gây rối như bạn phản hồi
  // Tên màu/BTP dùng cho Nhập/Xuất BTP và cả Nhập TP (lúc đóng gói xong, tên chính
  // là tên BTP/quy cách của LSX Cắt đóng gói đó) - không còn ô "Tên NVL" riêng nữa
  const canNhapBienThe = loaiGD === "IN_BTP" || loaiGD === "OUT_BTP" || loaiGD === "IN_TP";
  // Chỉ tự quy đổi kg<->mét khi có biến thể + định mức rõ ràng (Nhập/Xuất BTP).
  // Xuất NVL thô không có biến thể cụ thể nên không tự tính được mét tương ứng.
  const canQuyDoi = canNhapBienThe && dinhMucQuyDoi;

  // Khi gõ tay 1 ô, tự tính ô còn lại theo định mức (nếu đủ điều kiện quy đổi)
  const handleChangeKg = (val) => {
    setSoLuongKg(val);
    setLastEdited("kg");
    if (canQuyDoi && val !== "") {
      const met = Number(val) / dinhMucQuyDoi;
      setSoLuongMet(isFinite(met) ? String(Math.round(met * 10) / 10) : "");
    }
  };
  const handleChangeMet = (val) => {
    setSoLuongMet(val);
    setLastEdited("met");
    if (canQuyDoi && val !== "") {
      const kg = Number(val) * dinhMucQuyDoi;
      setSoLuongKg(isFinite(kg) ? String(Math.round(kg * 10) / 10) : "");
    }
  };

  const handleSubmit = () => {
    if (gomVao === "lsx" && !lsxId) {
      setError("Vui lòng chọn Lệnh sản xuất");
      return;
    }
    if (gomVao === "po" && !poId) {
      setError("Vui lòng chọn PO");
      return;
    }
    if (!congDoanId) {
      setError("Vui lòng chọn công đoạn");
      return;
    }
    const kg = soLuongKg === "" ? 0 : Number(soLuongKg);
    const met = soLuongMet === "" ? 0 : Number(soLuongMet);
    if (kg <= 0 && met <= 0) {
      setError("Vui lòng nhập số kg hoặc số mét lớn hơn 0");
      return;
    }
    if (canNhapBienThe && !tenBienThe.trim()) {
      setError("Vui lòng nhập tên màu/BTP");
      return;
    }
    if (loaiGD === "OUT_BTP" && gomVao === "lsx" && !lsxDichId) {
      setError("Vui lòng chọn LSX đích (nơi dùng BTP này)");
      return;
    }
    if (loaiGD === "ISSUE_NVL" && !tenNVL.trim()) {
      setError("Vui lòng nhập tên NVL cần xuất");
      return;
    }
    if (loaiGD === "SCRAP" && !lyDoPhe.trim()) {
      setError("Vui lòng nhập lý do phế");
      return;
    }

    const gd = {
      id: initial?.id || uid(),
      ngay,
      loaiGD,
      gomVao,
      lsxId: gomVao === "lsx" ? lsxId : null,
      poId: gomVao === "po" ? poId : null,
      congDoanId,
      // congDoanNguon: với Xuất BTP từ LSX, đây là công đoạn THẬT của LSX nguồn
      // (dùng để trừ đúng tồn kho của lệnh đó). Các loại khác = congDoanId.
      congDoanNguon: loaiGD === "OUT_BTP" && gomVao === "lsx" ? lsxChon?.congDoanId || congDoanId : congDoanId,
      // lsxDichId: chỉ có ý nghĩa với Xuất BTP từ LSX - LSX cụ thể đang nhận BTP này,
      // dùng để tính chính xác "đầu vào đã nhận" cho đúng lệnh, không lẫn các lệnh
      // khác cùng công đoạn chạy song song
      lsxDichId: loaiGD === "OUT_BTP" && gomVao === "lsx" ? lsxDichId : null,
      tenBienThe: tenBienThe.trim(),
      // Với Nhập/Xuất BTP không còn ô NVL riêng (chỉ còn Tên màu/BTP), nên lưu
      // tenNVL = tenBienThe để các nơi khác (Dashboard tổng hợp theo tenNVL) vẫn
      // có dữ liệu hợp lệ, không bị rỗng
      tenNVL: canNhapBienThe ? tenBienThe.trim() : tenNVL.trim(),
      soLuongKg: kg > 0 ? kg : null,
      soLuongMet: met > 0 ? met : null,
      donViSoLuongMet: congDoanId === "cat_dong_goi" ? donViCatDongGoi : "m",
      lyDoPhe: loaiGD === "SCRAP" ? lyDoPhe.trim() : "",
      ghiChu: ghiChu.trim(),
    };
    onSave(gd);
  };

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalBox} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <h2 style={styles.modalTitle}>
            {initial ? `Sửa giao dịch — ${loaiHienTai?.ten}` : loaiCoDinh ? `Ghi giao dịch — ${loaiHienTai?.ten}` : "Ghi giao dịch mới"}
          </h2>
          <button onClick={onClose} style={styles.modalCloseBtn}>
            <X size={20} />
          </button>
        </div>

        <div style={styles.modalBody}>
          {error && (
            <div style={styles.errorBox}>
              <AlertCircle size={16} />
              <span>{error}</span>
            </div>
          )}

          {loaiCoDinh ? (
            <Field label="Ngày">
              <input type="date" style={styles.input} value={ngay} onChange={(e) => setNgay(e.target.value)} />
            </Field>
          ) : (
            <div style={styles.formRow2}>
              <Field label="Ngày">
                <input type="date" style={styles.input} value={ngay} onChange={(e) => setNgay(e.target.value)} />
              </Field>
              <Field label="Loại giao dịch *">
                <select style={styles.input} value={loaiGD} onChange={(e) => setLoaiGD(e.target.value)}>
                  {LOAI_GD_LIST.map((l) => (
                    <option key={l.id} value={l.id}>
                      {l.ten}
                    </option>
                  ))}
                </select>
              </Field>
            </div>
          )}

          <div style={styles.sectionDivider}>Gắn với *</div>
          <div style={styles.chipGrid}>
            <button
              type="button"
              onClick={() => {
                setGomVao("lsx");
                setPoId("");
                setCongDoanId("");
              }}
              style={{ ...styles.chip, ...(gomVao === "lsx" ? styles.chipActive : {}) }}
            >
              Lệnh sản xuất (LSX)
            </button>
            <button
              type="button"
              onClick={() => {
                setGomVao("po");
                setLsxId("");
                setCongDoanId("");
              }}
              style={{ ...styles.chip, ...(gomVao === "po" ? styles.chipActive : {}) }}
            >
              PO trực tiếp
            </button>
          </div>

          {gomVao === "lsx" ? (
            lsxList.length === 0 ? (
              <div style={styles.warnBox}>
                <AlertCircle size={15} />
                <span>Chưa có Lệnh sản xuất nào. Vào tab "Lệnh SX" để tạo trước.</span>
              </div>
            ) : (
              <div style={styles.formRow2}>
                <Field label={loaiGD === "OUT_BTP" ? "LSX nguồn (lấy BTP từ đâu) *" : "Chọn Lệnh sản xuất *"}>
                  <select
                    style={styles.input}
                    value={lsxId}
                    onChange={(e) => {
                      setLsxId(e.target.value);
                      const l = lsxList.find((x) => x.id === e.target.value);
                      // Xuất BTP: công đoạn là ĐÍCH (tổ trưởng tự chọn), không khóa theo LSX nguồn
                      if (loaiGD !== "OUT_BTP") setCongDoanId(l ? l.congDoanId : "");
                    }}
                  >
                    <option value="">-- Chọn LSX --</option>
                    {lsxList.map((l) => (
                      <option key={l.id} value={l.id}>
                        {l.ma} — {tenCongDoan(l.congDoanId)}
                      </option>
                    ))}
                  </select>
                </Field>
                {loaiGD === "OUT_BTP" ? (
                  <Field label="LSX đích (nơi dùng BTP này) *">
                    <select
                      style={styles.input}
                      value={lsxDichId}
                      onChange={(e) => {
                        setLsxDichId(e.target.value);
                        const lDich = lsxList.find((x) => x.id === e.target.value);
                        setCongDoanId(lDich ? lDich.congDoanId : "");
                      }}
                    >
                      <option value="">-- Chọn LSX đích --</option>
                      {lsxList
                        .filter((l) => l.id !== lsxId) // không cho chọn chính LSX nguồn làm đích
                        .map((l) => (
                          <option key={l.id} value={l.id}>
                            {l.ma} — {tenCongDoan(l.congDoanId)}
                          </option>
                        ))}
                    </select>
                  </Field>
                ) : (
                  <Field label="Công đoạn (tự xác định theo LSX)">
                    <input
                      style={{ ...styles.input, background: "#EDEFEA", color: lsxChon ? "#1A1D1B" : "#8B9189", fontWeight: 600 }}
                      value={lsxChon ? tenCongDoan(lsxChon.congDoanId) : ""}
                      placeholder="Chọn LSX trước"
                      disabled
                      readOnly
                    />
                  </Field>
                )}
              </div>
            )
          ) : poList.length === 0 ? (
            <div style={styles.warnBox}>
              <AlertCircle size={15} />
              <span>Chưa có PO nào. Vào tab "PO" để tạo trước.</span>
            </div>
          ) : (
            <div style={styles.formRow2}>
              <Field label="Chọn PO *">
                <POSearchSelect poList={poList} value={poId} onChange={setPoId} />
              </Field>
              <Field label="Công đoạn * (chọn tay)">
                <select style={styles.input} value={congDoanId} onChange={(e) => setCongDoanId(e.target.value)}>
                  <option value="">-- Chọn công đoạn --</option>
                  {CONG_DOAN_LIST.map((c) => (
                    <option key={c.id} value={c.id}>
                      {c.ten}
                    </option>
                  ))}
                </select>
              </Field>
            </div>
          )}

          <div style={styles.sectionDivider}>Chi tiết</div>
          {canNhapBienThe ? (
            <Field label={`Tên màu/BTP ${congDoanId ? `(${CONG_DOAN_LIST.find((c) => c.id === congDoanId)?.nhanGoiBienThe || ""})` : ""}`}>
              <input
                style={styles.input}
                value={tenBienThe}
                onChange={(e) => setTenBienThe(e.target.value)}
                placeholder="VD: GR, hoặc tên BTP"
                list="gd-bienthe-goi-y"
              />
            </Field>
          ) : (
            <Field
              label={
                loaiGD === "ISSUE_NVL"
                  ? "Tên NVL *"
                  : loaiGD === "SCRAP"
                  ? "Tên phế"
                  : "Tên NVL/BTP"
              }
            >
              <input
                style={styles.input}
                value={tenNVL}
                onChange={(e) => setTenNVL(e.target.value)}
                placeholder={loaiGD === "SCRAP" ? "VD: Đồng vụn, Nhựa thừa..." : "VD: Đồng 0.195"}
                list="gd-nvl-goi-y"
              />
            </Field>
          )}
          <datalist id="gd-bienthe-goi-y">
            {bienTheGoiY.map((b) => (
              <option key={b} value={b} />
            ))}
          </datalist>
          <datalist id="gd-nvl-goi-y">
            {nvlGoiY.map((n) => (
              <option key={n} value={n} />
            ))}
          </datalist>

          {loaiGD === "SCRAP" ? (
            <Field label="Số lượng (kg) *">
              <input
                type="number"
                style={styles.input}
                value={soLuongKg}
                onChange={(e) => handleChangeKg(e.target.value)}
                placeholder="0"
                step="0.1"
              />
            </Field>
          ) : (
            <div style={styles.formRow2}>
              <Field label={`Số lượng (kg)${canQuyDoi ? "" : " *"}`}>
                <input
                  type="number"
                  style={styles.input}
                  value={soLuongKg}
                  onChange={(e) => handleChangeKg(e.target.value)}
                  placeholder="0"
                  step="0.1"
                />
              </Field>
              <Field
                label={
                  congDoanId === "cat_dong_goi"
                    ? "Số lượng (mét hoặc Pcs)"
                    : `Số lượng (mét)${canQuyDoi ? " — tự tính" : ""}`
                }
              >
                <input
                  type="number"
                  style={styles.input}
                  value={soLuongMet}
                  onChange={(e) => handleChangeMet(e.target.value)}
                  placeholder="0"
                  step="0.1"
                />
              </Field>
            </div>
          )}
          {congDoanId === "cat_dong_goi" && loaiGD !== "SCRAP" && (
            <Field label="Đơn vị cho số ở ô bên phải">
              <select style={styles.input} value={donViCatDongGoi} onChange={(e) => setDonViCatDongGoi(e.target.value)}>
                <option value="m">Mét</option>
                <option value="pcs">Pcs (cuộn/cuốn/cái)</option>
              </select>
            </Field>
          )}
          {canQuyDoi && (
            <div style={styles.quyDoiHint}>
              Tự quy đổi theo tổng định mức BOM của "{tenBienThe}": 1 mét = {formatNumber(dinhMucQuyDoi, 6)} kg
            </div>
          )}

          {loaiGD === "SCRAP" && (
            <Field label="Lý do phế *">
              <input
                style={styles.input}
                value={lyDoPhe}
                onChange={(e) => setLyDoPhe(e.target.value)}
                placeholder="VD: Đứt đồng (gõ tự do, gợi ý từ các lần ghi trước)"
                list="ly-do-phe-goi-y"
              />
              <datalist id="ly-do-phe-goi-y">
                {layGoiYLyDoPhe(gdList).map((l) => (
                  <option key={l} value={l} />
                ))}
              </datalist>
            </Field>
          )}

          <Field label="Ghi chú">
            <input style={styles.input} value={ghiChu} onChange={(e) => setGhiChu(e.target.value)} placeholder="Không bắt buộc" />
          </Field>
        </div>

        <div style={styles.modalFooter}>
          <button style={styles.btnGhost} onClick={onClose}>
            Hủy
          </button>
          <button style={styles.btnPrimary} onClick={handleSubmit}>
            {initial ? "Lưu thay đổi" : "Lưu giao dịch"}
            <ChevronRight size={16} />
          </button>
        </div>
      </div>
    </div>
  );
}

// ====================================================================
// MODULE DASHBOARD
// ====================================================================
function ModuleDashboard({ poList, bomList, lsxList, gdList }) {
  const [poFilter, setPoFilter] = useState("all");
  const [poDetailId, setPoDetailId] = useState("");
  // Lọc theo khoảng ngày, áp dụng cho dữ liệu Giao dịch khi tính KPI/phế/tiến độ
  const [tuNgay, setTuNgay] = useState("");
  const [denNgay, setDenNgay] = useState("");

  // gdList đã lọc theo khoảng ngày (nếu có chọn) - dùng cho toàn bộ tính toán Dashboard
  const gdListLoc = useMemo(() => {
    if (!tuNgay && !denNgay) return gdList;
    return gdList.filter((g) => {
      const ngayGD = (g.ngay || "").slice(0, 10);
      if (tuNgay && ngayGD < tuNgay) return false;
      if (denNgay && ngayGD > denNgay) return false;
      return true;
    });
  }, [gdList, tuNgay, denNgay]);

  const stats = useMemo(() => {
    const dangChay = poList.filter((p) => p.trangThai === "dang_chay").length;
    const hoanTat = poList.filter((p) => p.trangThai === "hoan_tat").length;
    const tongMetMucTieu = poList.reduce((acc, p) => acc + (Number(p.mucTieuMet) || 0), 0);
    return { dangChay, hoanTat, tongMetMucTieu, total: poList.length };
  }, [poList]);

  // Phế theo lý do (tính theo kg) - và tổng phế + tỷ lệ phế cho KPI dòng trên cùng
  const pheTheoLyDo = useMemo(() => {
    const map = {};
    gdListLoc
      .filter((g) => g.loaiGD === "SCRAP")
      .forEach((g) => {
        const ly = g.lyDoPhe || "Khác";
        map[ly] = (map[ly] || 0) + (Number(g.soLuongKg) || 0);
      });
    return Object.entries(map)
      .map(([lyDo, kg]) => ({ lyDo, kg }))
      .sort((a, b) => b.kg - a.kg);
  }, [gdListLoc]);

  const pheStats = useMemo(() => {
    const tongPhe = pheTheoLyDo.reduce((acc, x) => acc + x.kg, 0);
    // Tỷ lệ phế = tổng phế / tổng NVL đã xuất (ISSUE_NVL) trong cùng khoảng lọc -
    // mẫu số dùng NVL xuất ra vì đó là "đầu vào" để so phế phát sinh từ đó
    const tongXuatNVL = gdListLoc
      .filter((g) => g.loaiGD === "ISSUE_NVL")
      .reduce((acc, g) => acc + (Number(g.soLuongKg) || 0), 0);
    const tyLePhe = tongXuatNVL > 0 ? (tongPhe / tongXuatNVL) * 100 : 0;
    return { tongPhe, tyLePhe };
  }, [pheTheoLyDo, gdListLoc]);

  // Tiến độ Nhập TP theo từng PO (KH vs TT) - tính theo mét
  const tienDoPO = useMemo(() => {
    return poList.map((po) => {
      const tongNhapTP = gdListLoc
        .filter((g) => g.loaiGD === "IN_TP" && g.gomVao === "po" && g.poId === po.id)
        .reduce((acc, g) => acc + (Number(g.soLuongMet) || 0), 0);
      const phanTram = po.mucTieuMet > 0 ? Math.min(100, (tongNhapTP / po.mucTieuMet) * 100) : 0;
      return { po, tongNhapTP, phanTram };
    });
  }, [poList, gdListLoc]);

  const tienDoPOFiltered = useMemo(() => {
    if (poFilter === "all") return tienDoPO;
    if (poFilter === "dang_chay") return tienDoPO.filter((x) => x.po.trangThai === "dang_chay");
    return tienDoPO.filter((x) => x.po.trangThai === "hoan_tat");
  }, [tienDoPO, poFilter]);

  // Tiến độ Lệnh SX (mét lệnh đã Nhập BTP / tổng mét lệnh cần)
  const tienDoLSX = useMemo(() => {
    return lsxList.map((lsx) => {
      const bom = bomList.find((b) => b.id === lsx.bomId);
      const { tongMetCaLenh } = tinhTongHopLSX(lsx, bom);
      const tongNhap = gdListLoc
        .filter((g) => g.loaiGD === "IN_BTP" && g.gomVao === "lsx" && g.lsxId === lsx.id)
        .reduce((acc, g) => acc + (Number(g.soLuongMet) || 0), 0);
      const phanTram = tongMetCaLenh > 0 ? Math.min(100, (tongNhap / tongMetCaLenh) * 100) : 0;
      return { lsx, tongMetCaLenh, tongNhap, phanTram };
    });
  }, [lsxList, bomList, gdListLoc]);

  // ==== CHI TIẾT THEO 1 PO CỤ THỂ (chế độ xem sâu, giống mockup) ====
  const poDetail = poDetailId ? poList.find((p) => p.id === poDetailId) : null;
  const poDetailBom = poDetail ? bomList.find((b) => b.id === poDetail.bomId) : null;

  const chiTietPO = useMemo(() => {
    if (!poDetail || !poDetailBom) return null;

    // Cascade kế hoạch (KH) từ mục tiêu mét TP
    const cascadeKH = tinhCascadeBOM(poDetailBom, poDetail.mucTieuMet);

    // Giao dịch thực tế gắn trực tiếp với PO này, hoặc gắn qua LSX có chứa PO này
    const lsxChuaPO = lsxList.filter((l) => l.poItems?.some((it) => it.poId === poDetail.id));
    const lsxIdsChuaPO = new Set(lsxChuaPO.map((l) => l.id));

    const gdLienQuan = gdListLoc.filter(
      (g) => (g.gomVao === "po" && g.poId === poDetail.id) || (g.gomVao === "lsx" && lsxIdsChuaPO.has(g.lsxId))
    );

    // Tổng NVL xuất thực tế (ISSUE_NVL) liên quan PO này — lưu ý: nếu qua LSX gộp,
    // đây là số của CẢ lệnh, chỉ mang tính tham khảo tỷ trọng, không tách chính xác theo PO
    const tongXuatNVL_TT = {};
    gdLienQuan
      .filter((g) => g.loaiGD === "ISSUE_NVL")
      .forEach((g) => {
        tongXuatNVL_TT[g.tenNVL] = (tongXuatNVL_TT[g.tenNVL] || 0) + (Number(g.soLuongKg) || 0);
      });

    // Tổng phế liên quan (tính theo kg)
    const tongPhe = gdLienQuan
      .filter((g) => g.loaiGD === "SCRAP")
      .reduce((acc, g) => acc + (Number(g.soLuongKg) || 0), 0);

    const pheTheoLyDoPO = {};
    gdLienQuan
      .filter((g) => g.loaiGD === "SCRAP")
      .forEach((g) => {
        const ly = g.lyDoPhe || "Khác";
        pheTheoLyDoPO[ly] = (pheTheoLyDoPO[ly] || 0) + (Number(g.soLuongKg) || 0);
      });

    // Tiến độ theo công đoạn: mét Nhập BTP (qua LSX hoặc trực tiếp) / mét KH (cascade) của công đoạn đó
    const tienDoCongDoan = CONG_DOAN_LIST.map((cd) => {
      const rowsKH = cascadeKH.chiTiet.filter((r) => r.congDoanId === cd.id);
      const metKH = rowsKH.reduce((acc, r) => acc + r.metCongDoan, 0);
      const metTT = gdLienQuan
        .filter((g) => g.loaiGD === "IN_BTP" && g.congDoanId === cd.id)
        .reduce((acc, g) => acc + (Number(g.soLuongMet) || 0), 0);
      // Thành phẩm tính riêng từ IN_TP
      const metTT_TP =
        cd.id === "cat_dong_goi"
          ? gdLienQuan
              .filter((g) => g.loaiGD === "IN_TP")
              .reduce((acc, g) => acc + (Number(g.soLuongMet) || 0), 0)
          : metTT;
      const mocSoSanh = cd.id === "cat_dong_goi" ? poDetail.mucTieuMet : metKH;
      const ttSoSanh = cd.id === "cat_dong_goi" ? metTT_TP : metTT;
      const phanTram = mocSoSanh > 0 ? Math.min(100, (ttSoSanh / mocSoSanh) * 100) : 0;
      return { congDoan: cd, metKH: mocSoSanh, metTT: ttSoSanh, phanTram };
    }).filter((row) => row.metKH > 0);

    // Tỷ lệ hoàn thành theo từng màu Lõi (KH cascade vs TT giao dịch IN_BTP đúng màu đó)
    const hoanThanhTheoMau = cascadeKH.chiTiet
      .filter((r) => r.congDoanId === "loi")
      .map((r) => {
        const metTT = gdLienQuan
          .filter((g) => g.loaiGD === "IN_BTP" && g.congDoanId === "loi" && g.tenBienThe === r.tenBienThe)
          .reduce((acc, g) => acc + (Number(g.soLuongMet) || 0), 0);
        const phanTram = r.metCongDoan > 0 ? Math.min(150, (metTT / r.metCongDoan) * 100) : 0;
        return { tenMau: r.tenBienThe, metKH: r.metCongDoan, metTT, phanTram };
      });

    // Hao hụt NVL: KH (cascade) vs TT (xuất thực tế)
    const haoHutNVL = cascadeKH.tongTheoNvl.map((item) => {
      const tt = tongXuatNVL_TT[item.ten] || 0;
      return { ten: item.ten, kh: item.kg, tt, chenhLech: tt - item.kg };
    });

    const tongKH = cascadeKH.tongKg;
    const tongTT = Object.values(tongXuatNVL_TT).reduce((a, b) => a + b, 0);
    const tyLePhe = tongTT > 0 ? (tongPhe / tongTT) * 100 : 0;

    // Chuỗi công đoạn của PO này — sắp đúng thứ tự Lõi → Xoắn đôi → Vách → ...
    // Mỗi công đoạn: nếu PO này có trong 1 LSX của công đoạn đó, hiện LSX + % hoàn
    // thành của CHÍNH LSX đó (cả lệnh, vì gộp nhiều PO); nếu không qua LSX nào,
    // đánh dấu "Chưa có Lệnh SX" để biết cần tạo lệnh.
    const chuoiCongDoan = CONG_DOAN_LIST.filter((cd) => poDetailBom.congDoanApDung?.includes(cd.id)).map((cd) => {
      const lsxCuaCD = lsxChuaPO.find((l) => l.congDoanId === cd.id);
      if (!lsxCuaCD) {
        return { congDoan: cd, lsx: null, phanTram: 0, tongMetLSX: 0, tongNhapLSX: 0 };
      }
      const { tongMetCaLenh } = tinhTongHopLSX(lsxCuaCD, poDetailBom);
      const tongNhap = gdList
        .filter((g) => g.loaiGD === "IN_BTP" && g.gomVao === "lsx" && g.lsxId === lsxCuaCD.id)
        .reduce((acc, g) => acc + (Number(g.soLuongMet) || 0), 0);
      const phanTram = tongMetCaLenh > 0 ? Math.min(100, (tongNhap / tongMetCaLenh) * 100) : 0;
      return { congDoan: cd, lsx: lsxCuaCD, phanTram, tongMetLSX: tongMetCaLenh, tongNhapLSX: tongNhap };
    });

    return {
      cascadeKH,
      tienDoCongDoan,
      hoanThanhTheoMau,
      haoHutNVL,
      tongKH,
      tongTT,
      tongPhe,
      tyLePhe,
      pheTheoLyDoPO: Object.entries(pheTheoLyDoPO)
        .map(([lyDo, kg]) => ({ lyDo, kg }))
        .sort((a, b) => b.kg - a.kg),
      lsxChuaPO,
      chuoiCongDoan,
    };
  }, [poDetail, poDetailBom, lsxList, gdListLoc]);

  return (
    <div>
      <div style={styles.moduleHeader}>
        <div>
          <h2 style={styles.moduleTitle}>Dashboard tổng quan</h2>
          <p style={styles.moduleSub}>Theo dõi tiến độ từng PO là chính</p>
        </div>
        <Field label="Xem chi tiết 1 PO">
          <div style={{ minWidth: 240 }}>
            <POSearchSelect poList={poList} value={poDetailId} onChange={setPoDetailId} placeholder="— Tổng quan tất cả PO —" />
          </div>
        </Field>
      </div>

      {poDetail && chiTietPO ? (
        <PODetailDashboard po={poDetail} bom={poDetailBom} detail={chiTietPO} />
      ) : (
        <>
          <div style={styles.dashLocNgayRow}>
            <Field label="Từ ngày">
              <input type="date" style={styles.input} value={tuNgay} onChange={(e) => setTuNgay(e.target.value)} />
            </Field>
            <Field label="Đến ngày">
              <input type="date" style={styles.input} value={denNgay} onChange={(e) => setDenNgay(e.target.value)} />
            </Field>
            {(tuNgay || denNgay) && (
              <button
                style={styles.btnGhost}
                onClick={() => {
                  setTuNgay("");
                  setDenNgay("");
                }}
              >
                Bỏ lọc ngày
              </button>
            )}
          </div>

          <div style={styles.kpiRow5}>
            <KpiCard label="PO đang chạy" value={stats.dangChay} accent="#C8602F" icon={<Clock size={16} />} />
            <KpiCard label="PO hoàn tất" value={stats.hoanTat} accent="#2F6B47" icon={<CheckCircle2 size={16} />} />
            <KpiCard label="Tổng mét mục tiêu" value={formatNumber(stats.tongMetMucTieu, 0)} accent="#0B3D2E" />
            <KpiCard label="Phế" value={`${formatNumber(pheStats.tongPhe, 1)} kg`} accent="#B23A3A" />
            <KpiCard
              label="Tỷ lệ phế"
              value={`${formatNumber(pheStats.tyLePhe, 1)}%`}
              accent={pheStats.tyLePhe > 5 ? "#B23A3A" : "#C8602F"}
              icon={pheStats.tyLePhe > 5 ? <AlertCircle size={16} /> : undefined}
            />
          </div>

          {/* LỚP 2 — TIẾN ĐỘ PO, đặt lên đầu và nổi bật vì đây là trọng tâm chính */}
          <div style={styles.lop2Box}>
            <div style={styles.progressHeadRow}>
              <div style={styles.sectionDividerLop2}>Tiến độ nhận hàng từng PO</div>
            </div>
            <div style={styles.filterRow}>
              {[
                { key: "all", label: "Tất cả" },
                { key: "dang_chay", label: "Đang chạy" },
                { key: "hoan_tat", label: "Hoàn tất" },
              ].map((f) => (
                <button
                  key={f.key}
                  onClick={() => setPoFilter(f.key)}
                  style={{ ...styles.filterTab, ...(poFilter === f.key ? styles.filterTabActive : {}) }}
                >
                  {f.label}
                </button>
              ))}
            </div>
            {tienDoPOFiltered.length === 0 ? (
              <div style={styles.emptyStateSmall}>Chưa có PO nào</div>
            ) : (
              <div style={styles.progressListLop2}>
                {tienDoPOFiltered.map(({ po, tongNhapTP, phanTram }) => (
                  <div key={po.id} style={styles.progressItemLop2}>
                    <div style={styles.progressHead}>
                      <span style={styles.progressTitleLop2}>
                        {po.maPO} <span style={styles.progressSub}>({po.khachHang})</span>
                      </span>
                      <span style={styles.progressPctLop2}>{formatNumber(phanTram, 0)}%</span>
                    </div>
                    <div style={styles.progressBarBgLop2}>
                      <div style={{ ...styles.progressBarFillLop2, width: `${phanTram}%` }} />
                    </div>
                    <div style={styles.progressFoot}>
                      {formatNumber(tongNhapTP, 1)} / {formatNumber(po.mucTieuMet, 1)} m
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* LỚP 1 — LSX tổng, thu nhỏ đặt dưới vì chỉ mang tính tham khảo phụ */}
          <div style={styles.sectionDivider}>Tiến độ Lệnh SX tổng</div>
          {tienDoLSX.length === 0 ? (
            <div style={styles.emptyStateSmall}>Chưa có Lệnh sản xuất nào</div>
          ) : (
            <div style={styles.lop1CompactGrid}>
              {tienDoLSX.map(({ lsx, tongMetCaLenh, tongNhap, phanTram }) => {
                const tenCacPO = (lsx.poItems || [])
                  .map((item) => poList.find((p) => p.id === item.poId)?.maPO)
                  .filter(Boolean);
                return (
                  <div key={lsx.id} style={styles.lop1CompactItem}>
                    <div style={styles.progressHead}>
                      {/* Bỏ ghi chú tên công đoạn vì mã LSX đã có sẵn tên công đoạn trong mã */}
                      <span style={styles.progressTitleCompact}>{lsx.ma}</span>
                      <span style={styles.progressPctCompact}>{formatNumber(phanTram, 0)}%</span>
                    </div>
                    {tenCacPO.length > 0 && (
                      <div style={styles.progressPoRow}>
                        {tenCacPO.map((ten) => (
                          <span key={ten} style={styles.progressPoChip}>
                            {ten}
                          </span>
                        ))}
                      </div>
                    )}
                    <div style={styles.progressBarBg}>
                      <div style={{ ...styles.progressBarFill, width: `${phanTram}%` }} />
                    </div>
                    <div style={styles.progressFoot}>
                      {formatNumber(tongNhap, 1)} / {formatNumber(tongMetCaLenh, 1)} m
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div style={styles.sectionDivider}>Phân tích phế liệu theo lý do</div>
          {pheTheoLyDo.length === 0 ? (
            <div style={styles.emptyStateSmall}>Chưa có dữ liệu phế</div>
          ) : (
            <div style={styles.pheGrid}>
              {pheTheoLyDo.map((item) => (
                <div key={item.lyDo} style={styles.pheItem}>
                  <span style={styles.pheLyDo}>{item.lyDo}</span>
                  <span style={styles.pheKg}>{formatNumber(item.kg, 1)} kg</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ====================================================================
// CHI TIẾT DASHBOARD THEO 1 PO (chế độ xem sâu)
// ====================================================================
// Xuất báo cáo PO ra file Excel - dùng đúng dữ liệu đang hiển thị trên Dashboard
// chi tiết PO (KPI, tiến độ công đoạn, NVL tiêu hao KH/TT/CL, phế theo lý do)
function xuatBaoCaoPOExcel(po, bom, detail) {
  const wb = XLSX.utils.book_new();

  const tyLeHoanThanh =
    po.mucTieuMet > 0
      ? Math.min(100, (detail.tienDoCongDoan.find((r) => r.congDoan.id === "cat_dong_goi")?.metTT || 0) / po.mucTieuMet * 100)
      : 0;
  const haoHutTong = detail.tongTT - detail.tongKH;

  // Sheet 1: Tổng quan
  const sheetTongQuan = [
    ["BÁO CÁO TỔNG KẾT PO"],
    [],
    ["Mã PO", po.maPO],
    ["Khách hàng", po.khachHang],
    ["Mã Thành phẩm", bom?.maTP || ""],
    ["Quy cách", bom?.quyCach || ""],
    ["Ngày tạo", formatNgayGio(po.ngayTao)],
    ["Trạng thái", po.trangThai === "dang_chay" ? "Đang chạy" : "Hoàn tất"],
    [],
    ["CHỈ SỐ TỔNG HỢP"],
    ["Mục tiêu mét TP", po.mucTieuMet],
    ["Tỷ lệ hoàn thành TP (%)", Number(tyLeHoanThanh.toFixed(1))],
    ["Tổng NVL kế hoạch (kg)", Number(detail.tongKH.toFixed(2))],
    ["Tổng NVL thực tế (kg)", Number(detail.tongTT.toFixed(2))],
    ["Hao hụt NVL TT-KH (kg)", Number(haoHutTong.toFixed(2))],
    ["Tổng phế (kg)", Number(detail.tongPhe.toFixed(2))],
    ["Tỷ lệ phế (%)", Number(detail.tyLePhe.toFixed(1))],
  ];
  const wsTongQuan = XLSX.utils.aoa_to_sheet(sheetTongQuan);
  wsTongQuan["!cols"] = [{ wch: 28 }, { wch: 22 }];
  XLSX.utils.book_append_sheet(wb, wsTongQuan, "Tổng quan");

  // Sheet 2: Tiến độ theo công đoạn
  const sheetTienDo = [
    ["Công đoạn", "Mét kế hoạch", "Mét thực tế", "Tỷ lệ hoàn thành (%)"],
    ...detail.tienDoCongDoan.map((r) => [
      r.congDoan.ten,
      Number(r.metKH.toFixed(1)),
      Number(r.metTT.toFixed(1)),
      Number(r.phanTram.toFixed(1)),
    ]),
  ];
  const wsTienDo = XLSX.utils.aoa_to_sheet(sheetTienDo);
  wsTienDo["!cols"] = [{ wch: 20 }, { wch: 16 }, { wch: 16 }, { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, wsTienDo, "Tiến độ công đoạn");

  // Sheet 3: NVL tiêu hao KH/TT/CL
  const sheetNvl = [
    ["Tên NVL", "Kế hoạch (kg)", "Thực tế (kg)", "Chênh lệch (kg)"],
    ...detail.haoHutNVL.map((n) => [
      n.ten,
      Number(n.kh.toFixed(2)),
      Number(n.tt.toFixed(2)),
      Number(n.chenhLech.toFixed(2)),
    ]),
  ];
  const wsNvl = XLSX.utils.aoa_to_sheet(sheetNvl);
  wsNvl["!cols"] = [{ wch: 24 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];
  XLSX.utils.book_append_sheet(wb, wsNvl, "Tiêu hao NVL");

  // Sheet 4: Tỷ lệ hoàn thành theo màu Lõi
  if (detail.hoanThanhTheoMau.length > 0) {
    const sheetMau = [
      ["Màu", "Mét kế hoạch", "Mét thực tế", "Tỷ lệ hoàn thành (%)"],
      ...detail.hoanThanhTheoMau.map((m) => [
        m.tenMau,
        Number(m.metKH.toFixed(1)),
        Number(m.metTT.toFixed(1)),
        Number(m.phanTram.toFixed(1)),
      ]),
    ];
    const wsMau = XLSX.utils.aoa_to_sheet(sheetMau);
    wsMau["!cols"] = [{ wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 20 }];
    XLSX.utils.book_append_sheet(wb, wsMau, "Hoàn thành theo màu");
  }

  // Sheet 5: Phế theo lý do
  const sheetPhe = [
    ["Lý do phế", "Số kg"],
    ...detail.pheTheoLyDoPO.map((p) => [p.lyDo, Number(p.kg.toFixed(2))]),
  ];
  const wsPhe = XLSX.utils.aoa_to_sheet(sheetPhe);
  wsPhe["!cols"] = [{ wch: 24 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, wsPhe, "Phế theo lý do");

  const tenFile = `BaoCao_${po.maPO.replace(/[^a-zA-Z0-9]/g, "_")}_${todayISO()}.xlsx`;
  XLSX.writeFile(wb, tenFile);
}
