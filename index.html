const CONG_DOAN_LIST = [

function tenCongDoan(id) {
  return CONG_DOAN_LIST.find((c) => c.id === id)?.ten || id;
}

// Tạo mã LSX tăng dần theo từng công đoạn (LSX-LOI-001, LSX-LOI-002...) thay vì
// số ngẫu nhiên từ timestamp - dễ đọc, dễ nói miệng, dễ tra cứu hơn. Đếm số LSX
// hiện có cùng công đoạn, lấy số lớn nhất + 1, định dạng 3 chữ số.
function taoMaLSXTangDan(congDoanId, lsxList) {
  const tienTo = `LSX-${tenCongDoan(congDoanId).toUpperCase().replace(/\s/g, "")}-`;
  let soLonNhat = 0;
  (lsxList || []).forEach((l) => {
    if (l.ma && l.ma.startsWith(tienTo)) {
      const phanSo = l.ma.slice(tienTo.length);
      const so = parseInt(phanSo, 10);
      if (!isNaN(so) && so > soLonNhat) soLonNhat = so;
    }
  });
  const soMoi = soLonNhat + 1;
  return `${tienTo}${String(soMoi).padStart(3, "0")}`;
}

// Nhóm NVL thô cố định — dùng để lọc/tổng hợp đúng theo nhóm trên card PO,

const NHOM_NVL_LIST = ["Đồng", "Nhựa", "Giấy bạc", "Chỉ", "Khác"];

  return new Date().toISOString().slice(0, 10);

  return new Date().toISOString();

// Định dạng ngày giờ để hiển thị thân thiện trên card (vd: 24/06/2026 14:35)
function formatNgayGio(isoString) {
  if (!isoString) return "";
  const d = new Date(isoString);
  if (isNaN(d.getTime())) return "";
  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  return `${dd}/${mm}/${yyyy} ${hh}:${mi}`;
}
function formatNumber(n, digits = 1) {
  if (n === "" || n === null || n === undefined || isNaN(n)) return "0";
  const num = Number(n);
  const isNegative = num < 0;
  const fixed = Math.abs(num).toFixed(digits);
  const [phanNguyen, phanLe] = fixed.split(".");
  // Tự chèn dấu chấm phân nhóm nghìn vào phần nguyên, không phụ thuộc
  // vào toLocaleString của trình duyệt (môi trường artifact có thể không
  // hỗ trợ đầy đủ locale "vi-VN" nên số ra không có dấu chấm phân nghìn)
  const phanNguyenCoChiam = phanNguyen.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const ketQua = phanLe ? `${phanNguyenCoChiam},${phanLe}` : phanNguyenCoChiam;
  return isNegative ? `-${ketQua}` : ketQua;
}
function sumNVL(nvlList) {
  if (!nvlList || nvlList.length === 0) return 0;
  return nvlList.reduce((acc, n) => acc + (Number(n.dinhMuc) || 0), 0);
}

async function loadData(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}
async function saveData(key, list) {
  try {
    localStorage.setItem(key, JSON.stringify(list));
  } catch (e) {
    console.error("Lỗi lưu dữ liệu:", key, e);
  }
}

// Tổng hợp toàn bộ NVL của 1 BOM, gộp theo ĐÚNG TÊN NVL
function tongHopNvlToanBOM(bom) {
  const map = {};
  const add = (ten, dinhMuc) => {
    if (!ten) return;
    map[ten] = (map[ten] || 0) + (Number(dinhMuc) || 0);
  };
  Object.values(bom.dinhMuc || {}).forEach((bienTheList) => {
    (bienTheList || []).forEach((bt) => {
      (bt.nvlList || []).forEach((n) => add(n.ten, n.dinhMuc));
    });
  });
  return Object.entries(map)
    .map(([ten, tong]) => ({ ten, tong }))
    .sort((a, b) => b.tong - a.tong);
}

// ====================================================================
// ENGINE CASCADE: từ Mét TP, tính ngược ra mét mỗi công đoạn (theo Hệ số
// mét K đã khai trong BOM) rồi tính kg NVL mỗi loại (mét công đoạn ×
// định mức NVL của đúng biến thể đó). Không cộng dồn nhiều lần - mỗi
// biến thể tính kg riêng theo mét đã cascade của chính nó.
// ====================================================================
function tinhCascadeBOM(bom, metTP) {
  const met = Number(metTP) || 0;
  const ketQua = []; // [{ congDoanId, congDoanTen, tenBienThe, heSoMet, metCongDoan, nvlList: [{ten, nhomNVL, dinhMuc, kg}] }]
  const tongNvl = {}; // gộp theo tên NVL bất kể từ đâu
  const tongTheoNhom = {}; // gộp theo Nhóm NVL (Đồng/Nhựa/Giấy bạc/Chỉ/Khác) - dùng cho card PO

  CONG_DOAN_LIST.forEach((cd) => {
    const bienTheList = bom.dinhMuc?.[cd.id];
    if (!bienTheList || bienTheList.length === 0) return;
    bienTheList.forEach((bt) => {
      const heSo = cd.coHeSoMet ? Number(bt.heSoMet) || 1 : 1;
      const metCongDoan = met * heSo;
      const nvlList = (bt.nvlList || []).map((n) => {
        const kg = metCongDoan * (Number(n.dinhMuc) || 0);
        tongNvl[n.ten] = (tongNvl[n.ten] || 0) + kg;
        const nhom = n.nhomNVL || "Khác";
        tongTheoNhom[nhom] = (tongTheoNhom[nhom] || 0) + kg;
        return { ten: n.ten, nhomNVL: nhom, dinhMuc: n.dinhMuc, kg };
      });
      ketQua.push({
        congDoanId: cd.id,
        congDoanTen: cd.ten,
        tenBienThe: bt.tenBienThe,
        heSoMet: heSo,
        metCongDoan,
        nvlList,
      });
    });
  });

  const tongNvlArr = Object.entries(tongNvl)
    .map(([ten, kg]) => ({ ten, kg }))
    .sort((a, b) => b.kg - a.kg);
  const tongTheoNhomArr = Object.entries(tongTheoNhom)
    .map(([nhom, kg]) => ({ nhom, kg }))
    .sort((a, b) => b.kg - a.kg);
  const tongKg = tongNvlArr.reduce((acc, x) => acc + x.kg, 0);

  return { chiTiet: ketQua, tongTheoNvl: tongNvlArr, tongTheoNhom: tongTheoNhomArr, tongKg };
}
