function ModulePO({ poList, persistPO, bomList }) {
  const [showForm, setShowForm] = useState(false);
  const [editingPO, setEditingPO] = useState(null);
  const [filterStatus, setFilterStatus] = useState("all");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [searchText, setSearchText] = useState("");

  const handleSavePO = async (po) => {
    let newList;
    if (editingPO) {
      newList = poList.map((p) => (p.id === po.id ? po : p));
    } else {
      newList = [...poList, po];
    }
    await persistPO(newList);
    setShowForm(false);
    setEditingPO(null);
  };

  const handleDelete = async (id) => {
    await persistPO(poList.filter((p) => p.id !== id));
    setConfirmDelete(null);
  };

  const handleToggleStatus = async (id) => {
    const newList = poList.map((p) =>
      p.id === id ? { ...p, trangThai: p.trangThai === "dang_chay" ? "hoan_tat" : "dang_chay" } : p
    );
    await persistPO(newList);
  };

  const filteredList = useMemo(() => {
    let list = filterStatus === "all" ? poList : poList.filter((p) => p.trangThai === filterStatus);
    if (searchText.trim()) {
      const s = searchText.trim().toLowerCase();
      list = list.filter(
        (p) => p.maPO.toLowerCase().includes(s) || (p.khachHang || "").toLowerCase().includes(s)
      );
    }
    return list;
  }, [poList, filterStatus, searchText]);

  const stats = useMemo(() => {
    const dangChay = poList.filter((p) => p.trangThai === "dang_chay").length;
    const hoanTat = poList.filter((p) => p.trangThai === "hoan_tat").length;
    return { total: poList.length, dangChay, hoanTat };
  }, [poList]);

  return (
    <div>
      <div style={styles.moduleHeader}>
        <div>
          <h2 style={styles.moduleTitle}>Quản lý PO</h2>
          <p style={styles.moduleSub}>Theo dõi đơn hàng sản xuất cáp</p>
        </div>
        <button
          style={styles.btnPrimary}
          onClick={() => {
            setEditingPO(null);
            setShowForm(true);
          }}
        >
          <Plus size={18} />
          <span>Tạo PO mới</span>
        </button>
      </div>

      <div style={styles.kpiRow}>
        <KpiCard label="Tổng số PO" value={stats.total} accent="#0B3D2E" />
        <KpiCard label="Đang chạy" value={stats.dangChay} accent="#C8602F" icon={<Clock size={16} />} />
        <KpiCard label="Hoàn tất" value={stats.hoanTat} accent="#2F6B47" icon={<CheckCircle2 size={16} />} />
      </div>

      <div style={styles.searchRow}>
        <input
          style={styles.searchInput}
          placeholder="Tìm theo mã PO hoặc tên khách hàng..."
          value={searchText}
          onChange={(e) => setSearchText(e.target.value)}
        />
        <span style={styles.countBadge}>
          {filteredList.length} / {poList.length} PO
        </span>
      </div>

      <div style={styles.filterRow}>
        {[
          { key: "all", label: "Tất cả" },
          { key: "dang_chay", label: "Đang chạy" },
          { key: "hoan_tat", label: "Hoàn tất" },
        ].map((f) => (
          <button
            key={f.key}
            onClick={() => setFilterStatus(f.key)}
            style={{ ...styles.filterTab, ...(filterStatus === f.key ? styles.filterTabActive : {}) }}
          >
            {f.label}
          </button>
        ))}
      </div>

      {filteredList.length === 0 ? (
        <div style={styles.emptyState}>
          <Package size={40} color="#A9AFA6" />
          <p style={styles.emptyTitle}>{poList.length === 0 ? "Chưa có PO nào" : "Không tìm thấy PO phù hợp"}</p>
          <p style={styles.emptySub}>
            {poList.length === 0 ? "Tạo PO đầu tiên để bắt đầu theo dõi sản xuất" : "Thử từ khóa hoặc bộ lọc khác"}
          </p>
        </div>
      ) : (
        <div style={styles.poGrid}>
          {filteredList
            .slice()
            .reverse()
            .map((po) => (
              <POCard
                key={po.id}
                po={po}
                bomList={bomList}
                onEdit={() => {
                  setEditingPO(po);
                  setShowForm(true);
                }}
                onDelete={() => setConfirmDelete(po.id)}
                onToggleStatus={() => handleToggleStatus(po.id)}
              />
            ))}
        </div>
      )}

      {showForm && (
        <POFormModal
          initial={editingPO}
          bomList={bomList}
          onClose={() => {
            setShowForm(false);
            setEditingPO(null);
          }}
          onSave={handleSavePO}
        />
      )}

      {confirmDelete && (
        <ConfirmModal
          message="Xóa PO này? Toàn bộ dữ liệu mục tiêu sẽ mất, hành động không thể hoàn tác."
          onCancel={() => setConfirmDelete(null)}
          onConfirm={() => handleDelete(confirmDelete)}
        />
      )}
    </div>
  );
}

function KpiCard({ label, value, accent, icon }) {
  return (
    <div style={styles.kpiCard}>
      <div style={styles.kpiTop}>
        <span style={styles.kpiLabel}>{label}</span>
        {icon && <span style={{ color: accent }}>{icon}</span>}
      </div>
      <div style={{ ...styles.kpiValue, color: accent }}>{value}</div>
    </div>
  );
}

function POCard({ po, bomList, onEdit, onDelete, onToggleStatus }) {
  const isDangChay = po.trangThai === "dang_chay";
  const bom = bomList.find((b) => b.id === po.bomId);

  // Tính lại Cascade để hiện đủ từng loại NVL thô, không gộp chung 1 số tổng
  const cascade = useMemo(() => {
    if (!bom || !po.mucTieuMet) return null;
    return tinhCascadeBOM(bom, po.mucTieuMet);
  }, [bom, po.mucTieuMet]);

  return (
    <div style={styles.poCard}>
      <div style={styles.poCardHeader}>
        <div>
          <div style={styles.poCode}>{po.maPO}</div>
          <div style={styles.poCustomer}>{po.khachHang}</div>
          {po.ngayTao && <div style={styles.poNgayTao}>Tạo lúc: {formatNgayGio(po.ngayTao)}</div>}
        </div>
        <button
          onClick={onToggleStatus}
          style={{
            ...styles.statusBadge,
            background: isDangChay ? "#FBEEE4" : "#E7F0EA",
            color: isDangChay ? "#C8602F" : "#2F6B47",
          }}
        >
          {isDangChay ? <Clock size={13} /> : <CheckCircle2 size={13} />}
          {isDangChay ? "Đang chạy" : "Hoàn tất"}
        </button>
      </div>

      {bom && (
        <div style={styles.poBomTag}>
          <FileText size={12} />
          <span>
            {bom.maTP} {bom.quyCach ? `(${bom.quyCach})` : ""}
          </span>
        </div>
      )}

      <div style={styles.poTargetGrid}>
        <div style={styles.poTargetItem}>
          <span style={styles.poTargetLabel}>Mục tiêu mét</span>
          <span style={styles.poTargetValue}>{formatNumber(po.mucTieuMet)} m</span>
        </div>
      </div>

      {cascade && (() => {
        // Chỉ hiện NVL có tên chứa "đồng" hoặc "nhựa" (không phân biệt hoa/thường,
        // không phân biệt dấu) - các loại khác (giấy bạc, chỉ...) ẩn hẳn trên card PO
        const chuanHoa = (s) =>
          s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const dongNhuaList = cascade.tongTheoNvl.filter((item) => {
          const t = chuanHoa(item.ten);
          return t.includes("dong") || t.includes("nhua");
        });
        if (dongNhuaList.length === 0) return null;
        return (
          <div style={styles.poNvlBoxNoiBat}>
            <div style={styles.poNvlBoxNoiBatTitle}>
              <Package size={15} />
              <span>NVL THÔ CẦN CẤP TỪ NGOÀI</span>
            </div>
            <div style={styles.poNvlGridNoiBat}>
              {dongNhuaList.map((item) => (
                <div key={item.ten} style={styles.poNvlItemNoiBat}>
                  <span style={styles.poNvlNameNoiBat}>{item.ten}</span>
                  <span style={styles.poNvlValueNoiBat}>{formatNumber(item.kg, 1)} kg</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      <div style={styles.poCardFooter}>
        <button onClick={onEdit} style={styles.iconBtn}>
          <Edit3 size={15} />
          <span>Sửa</span>
        </button>
        <button onClick={onDelete} style={{ ...styles.iconBtn, color: "#B23A3A" }}>
          <Trash2 size={15} />
          <span>Xóa</span>
        </button>
      </div>
    </div>
  );
}

function POFormModal({ initial, bomList, onClose, onSave }) {
  const [maPO, setMaPO] = useState(initial?.maPO || "");
  const [khachHang, setKhachHang] = useState(initial?.khachHang || "");
  const [ngayDuKien, setNgayDuKien] = useState(initial?.ngayDuKien || "");
  const [bomId, setBomId] = useState(initial?.bomId || "");
  const [mucTieuMet, setMucTieuMet] = useState(initial?.mucTieuMet ?? "");
  const [error, setError] = useState("");

  const bomChon = bomList.find((b) => b.id === bomId);
  const cascade = useMemo(() => {
    if (!bomChon || !mucTieuMet) return null;
    return tinhCascadeBOM(bomChon, mucTieuMet);
  }, [bomChon, mucTieuMet]);
  const mucTieuKgUocTinh = cascade ? cascade.tongKg : 0;

  const handleSubmit = () => {
    if (!maPO.trim()) {
      setError("Vui lòng nhập mã PO");
      return;
    }
    if (!khachHang.trim()) {
      setError("Vui lòng nhập tên khách hàng");
      return;
    }
    if (!bomId) {
      setError("Vui lòng chọn mã Thành phẩm (BOM) cho PO này");
      return;
    }

    const po = {
      id: initial?.id || uid(),
      maPO: maPO.trim(),
      khachHang: khachHang.trim(),
      // ngayTao: tự ghi nhận chính xác lúc bấm tạo, không cho sửa tay. Giữ nguyên
      // giá trị cũ nếu đang sửa PO đã có, chỉ gán mới khi tạo PO lần đầu.
      ngayTao: initial?.ngayTao || nowISO(),
      ngayDuKien,
      bomId,
      mucTieuMet: mucTieuMet === "" ? 0 : Number(mucTieuMet),
      mucTieuKgUocTinh,
      trangThai: initial?.trangThai || "dang_chay",
    };
    onSave(po);
  };

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalBox} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <h2 style={styles.modalTitle}>{initial ? "Sửa PO" : "Tạo PO mới"}</h2>
          <button onClick={onClose} style={styles.modalCloseBtn}>
            <X size={20} />
          </button>
        </div>

        <div style={styles.modalBody}>
          {error && (
            <div style={styles.errorBox}>
              <AlertCircle size={16} />
              <span>{error}</span>
            </div>
          )}

          <div style={styles.formRow2}>
            <Field label="Mã PO *">
              <input
                style={styles.input}
                value={maPO}
                onChange={(e) => setMaPO(e.target.value)}
                placeholder="VD: PO-JOHNSON-0621"
              />
            </Field>
            <Field label="Khách hàng *">
              <input
                style={styles.input}
                value={khachHang}
                onChange={(e) => setKhachHang(e.target.value)}
                placeholder="VD: Johnson Controls"
              />
            </Field>
          </div>

          <Field label="Ngày dự kiến hoàn tất">
            <input
              type="date"
              style={styles.input}
              value={ngayDuKien}
              onChange={(e) => setNgayDuKien(e.target.value)}
            />
          </Field>

          <div style={styles.sectionDivider}>Mã Thành phẩm (BOM) *</div>
          {bomList.length === 0 ? (
            <div style={styles.warnBox}>
              <AlertCircle size={15} />
              <span>Chưa có BOM nào. Vào tab "BOM" để tạo trước, sau đó quay lại chọn ở đây.</span>
            </div>
          ) : (
            <select style={styles.input} value={bomId} onChange={(e) => setBomId(e.target.value)}>
              <option value="">-- Chọn mã TP --</option>
              {bomList.map((b) => (
                <option key={b.id} value={b.id}>
                  {b.maTP} {b.quyCach ? `(${b.quyCach})` : ""}
                </option>
              ))}
            </select>
          )}

          <div style={styles.sectionDivider}>Mục tiêu sản lượng</div>
          <Field label="Mục tiêu (mét Thành phẩm)">
            <input
              type="number"
              style={styles.input}
              value={mucTieuMet}
              onChange={(e) => setMucTieuMet(e.target.value)}
              placeholder="0"
            />
          </Field>

          {cascade && (
            <>
              <div style={styles.sectionDivider}>
                Cascade tự động — mét từng công đoạn (theo Hệ số mét trong BOM)
              </div>

                      {row.heSoMet !== 1 && (
                        <span style={styles.heSoMetChip}>K = {formatNumber(row.heSoMet, 4)}</span>
                      )}

                    </div>
                    {row.nvlList.length > 0 && (
                      <div style={styles.cascadeNvlRow}>

                          <span key={i} style={styles.nvlChipDisplay}>
                            {n.ten}: {formatNumber(n.kg, 1)} kg

                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>

              <div style={styles.tongHopBox}>
                <div style={styles.tongHopTitle}>Tổng NVL dự kiến cần xuất (kg)</div>

                  {cascade.tongTheoNvl.map((item) => (
                    <div key={item.ten} style={styles.tongHopItem}>

                  ))}
                  <div style={{ ...styles.tongHopItem, background: "#0B3D2E" }}>
                    <span style={{ ...styles.tongHopName, color: "#CFE3D2" }}>Tổng cộng</span>
                    <span style={{ ...styles.tongHopValue, color: "#fff" }}>
                      {formatNumber(mucTieuKgUocTinh, 1)} kg
                    </span>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>

        <div style={styles.modalFooter}>
          <button style={styles.btnGhost} onClick={onClose}>
            Hủy
          </button>
          <button style={styles.btnPrimary} onClick={handleSubmit}>
            {initial ? "Lưu thay đổi" : "Tạo PO"}
            <ChevronRight size={16} />
          </button>
        </div>
      </div>
    </div>
  );
}

function layGoiYNvlTheoCongDoan(bomList, congDoanId) {
  const set = new Set();
  bomList.forEach((bom) => {
    const bienTheList = bom.dinhMuc?.[congDoanId];
    if (bienTheList) {
      bienTheList.forEach((bt) => {
        (bt.nvlList || []).forEach((n) => {
          if (n.ten) set.add(n.ten);
        });
      });
    }
  });
  return Array.from(set).sort((a, b) => a.localeCompare(b, "vi"));
}
function layGoiYBienTheTheoCongDoan(bomList, congDoanId) {
  const set = new Set();
  bomList.forEach((bom) => {
    const bienTheList = bom.dinhMuc?.[congDoanId];
    if (bienTheList) {
      bienTheList.forEach((bt) => {
        if (bt.tenBienThe) set.add(bt.tenBienThe);
      });
    }
  });
  return Array.from(set).sort((a, b) => a.localeCompare(b, "vi"));
}

function ModuleBOM({ bomList, persistBOM }) {
  const [showForm, setShowForm] = useState(false);
  const [editingBOM, setEditingBOM] = useState(null);
  const [duplicateFrom, setDuplicateFrom] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [search, setSearch] = useState("");
  const [expandedId, setExpandedId] = useState(null);

  const handleSaveBOM = async (bom) => {
    let newList;
    const exists = bomList.find((b) => b.id === bom.id);
    if (exists) {
      newList = bomList.map((b) => (b.id === bom.id ? bom : b));
    } else {
      newList = [...bomList, bom];
    }
    await persistBOM(newList);
    setShowForm(false);
    setEditingBOM(null);
    setDuplicateFrom(null);
  };

  const handleDelete = async (id) => {
    await persistBOM(bomList.filter((b) => b.id !== id));
    setConfirmDelete(null);
  };

  const filteredList = useMemo(() => {
    if (!search.trim()) return bomList;
    const s = search.toLowerCase();
    return bomList.filter(
      (b) =>
        b.maTP.toLowerCase().includes(s) ||
        (b.tenMoTa || "").toLowerCase().includes(s) ||
        (b.quyCach || "").toLowerCase().includes(s)
    );
  }, [bomList, search]);

  return (
    <div>
      <div style={styles.moduleHeader}>
        <div>
          <h2 style={styles.moduleTitle}>Danh mục BOM</h2>
          <p style={styles.moduleSub}>Định mức NVL theo mã Thành phẩm</p>
        </div>
        <button
          style={styles.btnPrimary}
          onClick={() => {
            setEditingBOM(null);
            setDuplicateFrom(null);
            setShowForm(true);
          }}
        >
          <Plus size={18} />
          <span>Tạo BOM mới</span>
        </button>
      </div>

      <div style={styles.searchRow}>
        <input
          style={styles.searchInput}
          placeholder="Tìm mã TP, tên hoặc quy cách..."
          value={search}
          onChange={(e) => setSearch(e.target.value)}
        />
        <span style={styles.countBadge}>{bomList.length} mã TP</span>
      </div>

      {filteredList.length === 0 ? (
        <div style={styles.emptyState}>
          <FileText size={40} color="#A9AFA6" />
          <p style={styles.emptyTitle}>{bomList.length === 0 ? "Chưa có BOM nào" : "Không tìm thấy mã TP phù hợp"}</p>
          <p style={styles.emptySub}>
            {bomList.length === 0 ? "Tạo BOM cho mã Thành phẩm để dùng lại khi tạo PO mới" : "Thử từ khóa khác"}
          </p>
        </div>
      ) : (
        <div style={styles.bomList}>
          {filteredList.map((bom) => (
            <BOMCard
              key={bom.id}
              bom={bom}
              expanded={expandedId === bom.id}
              onToggleExpand={() => setExpandedId(expandedId === bom.id ? null : bom.id)}
              onEdit={() => {
                setEditingBOM(bom);
                setDuplicateFrom(null);
                setShowForm(true);
              }}
              onDuplicate={() => {
                setEditingBOM(null);
                setDuplicateFrom(bom);
                setShowForm(true);
              }}
              onDelete={() => setConfirmDelete(bom.id)}
            />
          ))}
        </div>
      )}

      {showForm && (
        <BOMFormModal
          initial={editingBOM}
          duplicateFrom={duplicateFrom}
          existingCodes={bomList.map((b) => b.maTP)}
          bomListForSuggestions={bomList}
          onClose={() => {
            setShowForm(false);
            setEditingBOM(null);
            setDuplicateFrom(null);
          }}
          onSave={handleSaveBOM}
        />
      )}

      {confirmDelete && (
        <ConfirmModal
          message="Xóa BOM này? Các PO đã tạo trước đó vẫn giữ dữ liệu cũ, nhưng PO mới sẽ không còn chọn được mã này."
          onCancel={() => setConfirmDelete(null)}
          onConfirm={() => handleDelete(confirmDelete)}
        />
      )}
    </div>
  );
}

function BOMFormModal({ initial, duplicateFrom, existingCodes, bomListForSuggestions, onClose, onSave }) {
  const baseData = initial || duplicateFrom;
  const [maTP, setMaTP] = useState(initial ? initial.maTP : "");
  const [tenMoTa, setTenMoTa] = useState(baseData?.tenMoTa || "");
  const [quyCach, setQuyCach] = useState(baseData?.quyCach || "");
  const [od, setOd] = useState(baseData?.od || "");
  const [doDayNhuaVo, setDoDayNhuaVo] = useState(baseData?.doDayNhuaVo || "");
  const [congDoanApDung, setCongDoanApDung] = useState(baseData?.congDoanApDung || []);

  const [dinhMuc, setDinhMuc] = useState(() => {
    if (!baseData?.dinhMuc) return {};
    const copy = {};
    Object.entries(baseData.dinhMuc).forEach(([cdId, list]) => {
      copy[cdId] = list.map((bt) => ({
        id: uid(),
        tenBienThe: bt.tenBienThe,
        heSoMet: bt.heSoMet !== undefined && bt.heSoMet !== null ? String(bt.heSoMet) : "1",
        nvlList: bt.nvlList.map((n) => ({ ten: n.ten, nhomNVL: n.nhomNVL || "Khác", dinhMuc: n.dinhMuc })),
      }));
    });
    return copy;
  });

  const [error, setError] = useState("");
  const tongHopPreview = useMemo(() => tongHopNvlToanBOM({ dinhMuc }), [dinhMuc]);

  const toggleCongDoan = (id) => {
    const has = congDoanApDung.includes(id);
    if (has) {
      setCongDoanApDung((prev) => prev.filter((x) => x !== id));
    } else {
      setCongDoanApDung((prev) => [...prev, id]);
      setDinhMuc((prev) => ({ ...prev, [id]: prev[id] || [] }));
    }
  };

  const addBienThe = (cdId) => {
    setDinhMuc((prev) => ({
      ...prev,
      [cdId]: [...(prev[cdId] || []), { id: uid(), tenBienThe: "", heSoMet: "1", nvlList: [{ ten: "", nhomNVL: "", dinhMuc: "" }] }],
    }));
  };
  const renameBienThe = (cdId, btId, newName) => {
    setDinhMuc((prev) => ({
      ...prev,
      [cdId]: prev[cdId].map((bt) => (bt.id === btId ? { ...bt, tenBienThe: newName } : bt)),
    }));
  };
  const updateHeSoMet = (cdId, btId, value) => {
    setDinhMuc((prev) => ({
      ...prev,
      [cdId]: prev[cdId].map((bt) => (bt.id === btId ? { ...bt, heSoMet: value } : bt)),
    }));
  };
  const removeBienThe = (cdId, btId) => {
    setDinhMuc((prev) => ({ ...prev, [cdId]: prev[cdId].filter((bt) => bt.id !== btId) }));
  };
  const addNvl = (cdId, btId) => {
    setDinhMuc((prev) => ({
      ...prev,
      [cdId]: prev[cdId].map((bt) =>
        bt.id === btId ? { ...bt, nvlList: [...bt.nvlList, { ten: "", nhomNVL: "", dinhMuc: "" }] } : bt
      ),
    }));
  };
  const updateNvl = (cdId, btId, idx, field, value) => {
    setDinhMuc((prev) => ({
      ...prev,
      [cdId]: prev[cdId].map((bt) =>
        bt.id === btId
          ? { ...bt, nvlList: bt.nvlList.map((n, i) => (i === idx ? { ...n, [field]: value } : n)) }
          : bt
      ),
    }));
  };
  const removeNvl = (cdId, btId, idx) => {
    setDinhMuc((prev) => ({
      ...prev,
      [cdId]: prev[cdId].map((bt) => (bt.id === btId ? { ...bt, nvlList: bt.nvlList.filter((_, i) => i !== idx) } : bt)),
    }));
  };

  const handleSubmit = () => {
    if (!maTP.trim()) {
      setError("Vui lòng nhập mã Thành phẩm");
      return;
    }
    const codeChanged = !initial || initial.maTP !== maTP.trim();
    if (codeChanged && existingCodes.includes(maTP.trim())) {
      setError("Mã TP này đã tồn tại, vui lòng dùng mã khác hoặc sửa BOM đã có");
      return;
    }
    if (congDoanApDung.length === 0) {
      setError("Chọn ít nhất 1 công đoạn áp dụng");
      return;
    }

    for (const cdId of congDoanApDung) {
      const list = dinhMuc[cdId] || [];
      for (const bt of list) {
        if (bt.tenBienThe.trim() === "" && bt.nvlList.some((n) => n.ten.trim() !== "")) {
          setError(`Có dòng chưa đặt tên ở công đoạn "${tenCongDoan(cdId)}"`);
          return;
        }
      }
    }

    const cleanDinhMuc = {};
    Object.entries(dinhMuc).forEach(([cdId, list]) => {
      if (!congDoanApDung.includes(cdId)) return;
      const cleaned = list
        .filter((bt) => bt.tenBienThe.trim() !== "")
        .map((bt) => ({
          tenBienThe: bt.tenBienThe.trim(),
          heSoMet: bt.heSoMet === "" || bt.heSoMet === undefined || isNaN(Number(bt.heSoMet)) ? 1 : Number(bt.heSoMet),
          nvlList: bt.nvlList
            .filter((n) => n.ten.trim() !== "")
            .map((n) => ({
              ten: n.ten.trim(),
              nhomNVL: n.nhomNVL && n.nhomNVL.trim() !== "" ? n.nhomNVL : "Khác",
              dinhMuc: n.dinhMuc === "" ? 0 : Number(n.dinhMuc),
            })),
        }))
        .filter((bt) => bt.nvlList.length > 0);
      if (cleaned.length > 0) cleanDinhMuc[cdId] = cleaned;
    });

    const bom = {
      id: initial?.id || uid(),
      maTP: maTP.trim(),
      tenMoTa: tenMoTa.trim(),
      quyCach: quyCach.trim(),
      od: od.trim(),
      doDayNhuaVo: doDayNhuaVo.trim(),
      congDoanApDung,
      dinhMuc: cleanDinhMuc,
    };
    onSave(bom);
  };

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalBox} onClick={(e) => e.stopPropagation()}>
        <div style={styles.modalHeader}>
          <h2 style={styles.modalTitle}>{initial ? "Sửa BOM" : duplicateFrom ? "Tạo bản sao BOM" : "Tạo BOM mới"}</h2>
          <button onClick={onClose} style={styles.modalCloseBtn}>
            <X size={20} />
          </button>
        </div>

        <div style={styles.modalBody}>
          {error && (
            <div style={styles.errorBox}>
              <AlertCircle size={16} />
              <span>{error}</span>
            </div>
          )}

          <div style={styles.formRow2}>
            <Field label="Mã Thành phẩm *">
              <input style={styles.input} value={maTP} onChange={(e) => setMaTP(e.target.value)} placeholder="VD: PRI-7-0195BC" />
            </Field>
            <Field label="Quy cách">
              <input style={styles.input} value={quyCach} onChange={(e) => setQuyCach(e.target.value)} placeholder="VD: 7/0.195BC" />
            </Field>
          </div>

          <Field label="Tên / mô tả">
            <input style={styles.input} value={tenMoTa} onChange={(e) => setTenMoTa(e.target.value)} placeholder="VD: Cáp Johnson 4 lõi" />
          </Field>

          <div style={{ ...styles.formRow2, marginTop: 12 }}>
            <Field label="OD (tham khảo)">
              <input style={styles.input} value={od} onChange={(e) => setOd(e.target.value)} placeholder="VD: 1.05" />
            </Field>
            <Field label="Độ dày nhựa vỏ (tham khảo)">
              <input style={styles.input} value={doDayNhuaVo} onChange={(e) => setDoDayNhuaVo(e.target.value)} placeholder="VD: 0.45" />
            </Field>
          </div>

          <div style={styles.sectionDivider}>Công đoạn áp dụng *</div>
          <div style={styles.chipGrid}>
            {CONG_DOAN_LIST.map((cd) => (
              <button
                key={cd.id}
                type="button"
                onClick={() => toggleCongDoan(cd.id)}
                style={{ ...styles.chip, ...(congDoanApDung.includes(cd.id) ? styles.chipActive : {}) }}
              >
                {cd.ten}
              </button>
            ))}
          </div>

          {CONG_DOAN_LIST.filter((cd) => congDoanApDung.includes(cd.id)).map((cd) => {
            const list = dinhMuc[cd.id] || [];
            const goiYBienThe = [...cd.goiYBienThe, ...layGoiYBienTheTheoCongDoan(bomListForSuggestions || [], cd.id)];
            const goiYBienTheUnique = Array.from(new Set(goiYBienThe));
            const nvlGoiYChoCD = layGoiYNvlTheoCongDoan(bomListForSuggestions || [], cd.id);

            return (
              <div key={cd.id}>
                <div style={styles.sectionDivider}>
                  {cd.ten} — định mức theo {cd.nhanGoiBienThe}
                </div>
                {list.map((bt) => (
                  <div key={bt.id} style={styles.dinhMucEditBox}>
                    <div style={styles.mauNameRow}>
                      <input
                        style={{ ...styles.input, flex: 1, fontWeight: 700 }}
                        placeholder={`Tên ${cd.nhanGoiBienThe} (gõ tự do)`}
                        value={bt.tenBienThe}
                        onChange={(e) => renameBienThe(cd.id, bt.id, e.target.value)}
                        list={`bienthe-goi-y-${cd.id}`}
                      />
                      {cd.coHeSoMet && (
                        <input
                          type="number"
                          style={{ ...styles.input, width: 100, flexShrink: 0 }}
                          placeholder="Hệ số m"
                          value={bt.heSoMet}
                          onChange={(e) => updateHeSoMet(cd.id, bt.id, e.target.value)}
                          step="0.0001"
                          title="Hệ số mét: số mét cần SX ở công đoạn này cho mỗi 1 mét TP cuối"
                        />
                      )}
                      <button type="button" onClick={() => removeBienThe(cd.id, bt.id)} style={styles.nvlRemoveBtn}>
                        <Trash2 size={15} />
                      </button>
                    </div>
                    {cd.coHeSoMet && (
                      <div style={styles.heSoMetHint}>
                        1m thành phẩm cần {formatNumber(bt.heSoMet || 1, 4)}m ở công đoạn {cd.ten}
                      </div>
                    )}
                    {bt.nvlList.map((nvl, idx) => (
                      <div key={idx} style={styles.nvlRow}>
                        <input
                          style={{ ...styles.input, flex: 2 }}
                          placeholder="Tên NVL cụ thể (VD: Đồng 0.195, Nhựa PVC đen...)"
                          value={nvl.ten}
                          onChange={(e) => updateNvl(cd.id, bt.id, idx, "ten", e.target.value)}
                          list={`nvl-goi-y-${cd.id}`}
                        />
                        <select
                          style={{ ...styles.input, flex: 1 }}
                          value={nvl.nhomNVL || ""}
                          onChange={(e) => updateNvl(cd.id, bt.id, idx, "nhomNVL", e.target.value)}
                        >
                          <option value="">Nhóm...</option>
                          {NHOM_NVL_LIST.map((n) => (
                            <option key={n} value={n}>
                              {n}
                            </option>
                          ))}
                        </select>
                        <input
                          type="number"
                          style={{ ...styles.input, flex: 1 }}
                          placeholder="kg/m"
                          value={nvl.dinhMuc}
                          onChange={(e) => updateNvl(cd.id, bt.id, idx, "dinhMuc", e.target.value)}
                          step="0.0000001"
                        />
                        <button type="button" onClick={() => removeNvl(cd.id, bt.id, idx)} style={styles.nvlRemoveBtn}>
                          <X size={15} />
                        </button>
                      </div>
                    ))}
                    <button type="button" onClick={() => addNvl(cd.id, bt.id)} style={styles.addNvlBtn}>
                      <Plus size={14} />
                      <span>Thêm NVL cho dòng này</span>
                    </button>
                  </div>
                ))}

                <datalist id={`bienthe-goi-y-${cd.id}`}>
                  {goiYBienTheUnique.map((m) => (
                    <option key={m} value={m} />
                  ))}
                </datalist>
                <datalist id={`nvl-goi-y-${cd.id}`}>
                  {nvlGoiYChoCD.map((n) => (
                    <option key={n} value={n} />
                  ))}
                </datalist>

                <button type="button" onClick={() => addBienThe(cd.id)} style={styles.addMauBtn}>
                  <Plus size={15} />
                  <span>
                    Thêm {cd.nhanGoiBienThe} cho {cd.ten}
                  </span>
                </button>
              </div>
            );
          })}

          {tongHopPreview.length > 0 && (
            <div style={styles.tongHopBoxSticky}>
              <div style={styles.tongHopTitle}>Tổng hợp NVL toàn BOM (đang nhập, kg/m)</div>
              <div style={styles.tongHopGrid}>
                {tongHopPreview.map((item) => (
                  <div key={item.ten} style={styles.tongHopItem}>
                    <span style={styles.tongHopName}>{item.ten}</span>
                    <span style={styles.tongHopValue}>{formatNumber(item.tong, 6)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div style={styles.modalFooter}>
          <button style={styles.btnGhost} onClick={onClose}>
            Hủy
          </button>
          <button style={styles.btnPrimary} onClick={handleSubmit}>
            {initial ? "Lưu thay đổi" : "Tạo BOM"}
            <ChevronRight size={16} />
          </button>

// Combobox tìm kiếm-chọn PO dùng chung, thay cho dropdown <select> thông thường.
// Gõ để lọc theo mã PO/khách hàng, bấm vào 1 dòng để chọn. Khi PO nhiều lên,
// việc gõ lọc nhanh hơn nhiều so với kéo dropdown dài.
function POSearchSelect({ poList, value, onChange, placeholder }) {
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const poChon = poList.find((p) => p.id === value);

  const filtered = useMemo(() => {
    if (!query.trim()) return poList.slice(0, 8);
    const s = query.trim().toLowerCase();
    return poList
      .filter((p) => p.maPO.toLowerCase().includes(s) || (p.khachHang || "").toLowerCase().includes(s))
      .slice(0, 8);
  }, [poList, query]);

  return (
    <div style={styles.poSearchSelectWrap}>
      <input
        style={styles.input}
        value={open ? query : poChon ? `${poChon.maPO} — ${poChon.khachHang}` : ""}
        onChange={(e) => {
          setQuery(e.target.value);
          setOpen(true);
          if (e.target.value === "") onChange("");
        }}
        onFocus={() => {
          setOpen(true);
          setQuery("");
        }}
        onBlur={() => setTimeout(() => setOpen(false), 150)}
        placeholder={placeholder || "Gõ để tìm mã PO hoặc khách hàng..."}
      />
      {open && (
        <div style={styles.poSearchSelectDropdown}>
          {filtered.length === 0 ? (
            <div style={styles.poSearchSelectEmpty}>Không tìm thấy PO phù hợp</div>
          ) : (
            filtered.map((p) => (
              <button
                key={p.id}
                type="button"
                style={styles.poSearchSelectItem}
                onMouseDown={(e) => {
                  e.preventDefault();
                  onChange(p.id);
                  setQuery("");
                  setOpen(false);
                }}
              >
                <span style={styles.poSearchSelectItemCode}>{p.maPO}</span>
                <span style={styles.poSearchSelectItemSub}>{p.khachHang}</span>
              </button>
            ))
          )}
        </div>
      )}
    </div>
  );
}

function ConfirmModal({ message, onCancel, onConfirm }) {
  return (
    <div style={styles.modalOverlay} onClick={onCancel}>
      <div style={styles.confirmBox} onClick={(e) => e.stopPropagation()}>
        <AlertCircle size={28} color="#B23A3A" />
        <p style={styles.confirmText}>{message}</p>
        <div style={styles.confirmActions}>
          <button style={styles.btnGhost} onClick={onCancel}>
            Hủy
          </button>
          <button style={styles.btnDanger} onClick={onConfirm}>
            Xóa
          </button>
        </div>
      </div>
    </div>
  );
}

// ================================================================
// ERROR BOUNDARY
// ================================================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      // Hide splash on error too
      const splash = document.getElementById("splash");
      if (splash) splash.remove();
      return React.createElement("div", {
        style: { padding: 32, fontFamily: "sans-serif", maxWidth: 600, margin: "40px auto" }
      },
        React.createElement("h2", { style: { color: "#B23A3A" } }, "⚠️ Lỗi khởi động"),
        React.createElement("pre", {
          style: { background: "#f8e9e9", padding: 16, borderRadius: 8, fontSize: 12, overflow: "auto", whiteSpace: "pre-wrap" }
        }, String(this.state.error)),
        React.createElement("button", {
          onClick: () => window.location.reload(),
          style: { marginTop: 16, padding: "10px 20px", background: "#0B3D2E", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer" }
        }, "Tải lại trang")
      );
    }
    return this.props.children;
  }
}

// ================================================================
// MOUNT
// ================================================================
const container = document.getElementById("root");
const reactRoot = ReactDOM.createRoot(container);
reactRoot.render(
  React.createElement(ErrorBoundary, null, React.createElement(MESApp))
);

// Hide splash after mount — Babel transpile can take 1-3s for large file
function hideSplash() {
  const splash = document.getElementById("splash");
  if (splash) {
    splash.classList.add("hide");
    setTimeout(() => { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 450);
  }
}
// Try after 800ms, retry after 2s if still showing
setTimeout(hideSplash, 800);
setTimeout(hideSplash, 2500);
</script>

<script>
// ================================================================
// SERVICE WORKER registration
// ================================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] Registered:', reg.scope))
      .catch(err => console.warn('[SW] Failed:', err));
  });
}

// ================================================================
// PWA Install prompt
// ================================================================
let deferredPrompt = null;
const banner = document.getElementById('pwa-banner');
const installBtn = document.getElementById('pwa-install-btn');
const closeBtn = document.getElementById('pwa-banner-close');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (banner) banner.style.display = 'flex';
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if (banner) banner.style.display = 'none';
  });
}

if (closeBtn) {
  closeBtn.addEventListener('click', () => {
    if (banner) banner.style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  if (banner) banner.style.display = 'none';
  deferredPrompt = null;
});
</script>
